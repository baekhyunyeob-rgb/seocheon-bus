<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬기로운 대중교통 생활 — 서천</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #0f6e56 0%, #1D9E75 50%, #2bb88a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 32px 28px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .badge {
    display: inline-block;
    background: #E1F5EE;
    color: #0f6e56;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 20px;
    font-weight: 800;
    color: #111;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }
  .qr-wrap {
    background: #f8f8f8;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #qr-canvas {
    border-radius: 8px;
  }
  .url-box {
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    color: #333;
    word-break: break-all;
    cursor: pointer;
    transition: border-color .2s;
  }
  .url-box:active { border-color: #1D9E75; }
  .copy-btn {
    width: 100%;
    padding: 13px;
    background: #1D9E75;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background .2s;
  }
  .copy-btn:active { background: #0f6e56; }
  .open-btn {
    width: 100%;
    padding: 13px;
    background: #f0f0f0;
    color: #333;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background .2s;
  }
  .open-btn:active { background: #e0e0e0; }
  .features {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .feature {
    background: #f8f8f8;
    border-radius: 10px;
    padding: 10px 8px;
    font-size: 11px;
    color: #555;
    text-align: center;
    line-height: 1.4;
  }
  .feature .icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .beta-note {
    margin-top: 16px;
    font-size: 11px;
    color: #bbb;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="card">
  <div class="badge">🚌 BETA</div>
  <h1>슬기로운<br>대중교통 생활</h1>
  <div class="sub">서천군 버스 길찾기 · 시간표</div>

  <div class="qr-wrap">
    <canvas id="qr-canvas" width="180" height="180"></canvas>
    <div class="url-box" id="url-text" onclick="copyUrl()">로딩 중...</div>
  </div>

  <button class="copy-btn" onclick="copyUrl()">🔗 주소 복사</button>
  <button class="open-btn" onclick="openApp()">앱 열기 →</button>

  <div class="features">
    <div class="feature"><span class="icon">🗺️</span>버스 경로<br>검색</div>
    <div class="feature"><span class="icon">🕐</span>정류장별<br>시간표</div>
    <div class="feature"><span class="icon">🚉</span>시외버스<br>기차 정보</div>
    <div class="feature"><span class="icon">⭐</span>즐겨찾기<br>자주이용</div>
  </div>

  <div class="beta-note">
    베타 버전입니다. 시간표는 추정값이며<br>
    실제와 다를 수 있습니다.<br>
    피드백 환영합니다 🙏
  </div>
</div>

<div class="toast" id="toast">주소가 복사됐습니다!</div>

<!-- QR 라이브러리 (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // 앱 주소 결정 (qr.html → index.html)
  const appUrl = (() => {
    const base = window.location.href.replace(/qr\.html.*$/, '').replace(/\/$/, '');
    return base || 'https://seocheon-bus.vercel.app';
  })();

  document.getElementById('url-text').textContent = appUrl;

  // QR 코드 생성
  try {
    new QRCode(document.getElementById('qr-canvas'), {
      text: appUrl,
      width: 180,
      height: 180,
      colorDark: '#0f6e56',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    // fallback: Google Charts QR API
    const img = document.createElement('img');
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(appUrl)}&color=0f6e56`;
    img.width = 180; img.height = 180;
    img.style.borderRadius = '8px';
    const canvas = document.getElementById('qr-canvas');
    canvas.parentNode.replaceChild(img, canvas);
  }

  function copyUrl() {
    navigator.clipboard.writeText(appUrl).then(() => {
      showToast('주소가 복사됐습니다!');
    }).catch(() => {
      // fallback
      const el = document.createElement('textarea');
      el.value = appUrl;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showToast('주소가 복사됐습니다!');
    });
  }

  function openApp() {
    window.location.href = appUrl;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
