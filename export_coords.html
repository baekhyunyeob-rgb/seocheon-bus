<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노선 좌표 추출 도구</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; color: #1a1a1a; }
  h2 { font-size: 16px; margin-bottom: 6px; }
  .sub { font-size: 12px; color: #888; margin-bottom: 24px; line-height: 1.6; }
  .card { background: #f8f8f8; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .label { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 8px; }
  .stat { font-size: 13px; line-height: 2; }
  .stat b { color: #1D9E75; }
  button {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
  }
  .btn-export { background: #1D9E75; color: #fff; }
  .btn-export:disabled { background: #ccc; cursor: not-allowed; }
  .btn-rebuild { background: #EF9F27; color: #fff; }
  .btn-rebuild:disabled { background: #ccc; cursor: not-allowed; }
  .msg { font-size: 12px; padding: 10px 14px; border-radius: 8px; margin-top: 8px; display:none; }
  .msg.ok  { background: #E1F5EE; color: #0F6E56; }
  .msg.err { background: #FCEBEB; color: #c0392b; }
  .progress { font-size: 12px; color: #888; margin-top: 8px; min-height: 18px; }
  .step { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; font-size:13px; line-height:1.6; }
  .step-num { background:#185FA5; color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; margin-top:1px; }
</style>
</head>
<body>

<h2>🗺️ 노선 좌표 추출 도구</h2>
<p class="sub">
  이 페이지는 <b>개발자 전용</b>입니다.<br>
  노선 좌표를 <code>route_coords.json</code>으로 내보내<br>
  일반 사용자가 API 없이도 바로 쓸 수 있게 합니다.
</p>

<div class="card">
  <div class="label">현재 상태</div>
  <div class="stat" id="stat">확인 중...</div>
</div>

<div class="card">
  <div class="label">사용 방법</div>
  <div class="step"><div class="step-num">1</div><div>아래 <b>좌표 내보내기</b> 버튼으로 <code>route_coords.json</code> 다운로드</div></div>
  <div class="step"><div class="step-num">2</div><div>다운로드한 파일을 앱의 <code>data/</code> 폴더에 넣기</div></div>
  <div class="step"><div class="step-num">3</div><div>배포 — 일반 사용자는 API 호출 없이 파일에서 바로 로드</div></div>
</div>

<button class="btn-export" id="btn-export" onclick="exportCoords()">⬇ route_coords.json 내보내기</button>
<button class="btn-rebuild" id="btn-rebuild" onclick="rebuildCoords()" style="display:none">🔄 좌표 재구축 후 내보내기</button>

<div class="msg" id="msg"></div>
<div class="progress" id="progress"></div>

<!-- 앱 JS 로드 -->
<script src="js/data.js"></script>
<script src="js/routeCoords.js"></script>
<script>
const CACHE_KEY = 'sc_route_coords_v4';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = 'block';
}

function updateStat() {
  const cached = localStorage.getItem(CACHE_KEY);
  const el = document.getElementById('stat');
  if (!cached) {
    el.innerHTML = `캐시: <b style="color:#E24B4A">없음</b><br>재구축이 필요합니다.`;
    document.getElementById('btn-export').disabled = true;
    document.getElementById('btn-rebuild').style.display = 'block';
    return;
  }
  try {
    const data = JSON.parse(cached);
    const keys = Object.keys(data);
    const rich = keys.filter(k => data[k].length >= 5).length;
    const hasSource = keys.some(k => data[k].some(c => c.source));
    el.innerHTML = `캐시: <b>있음</b><br>노선 수: <b>${keys.length}개</b><br>정류장 5개↑: <b>${rich}개</b><br>source 태그: <b>${hasSource ? '있음 ✅' : '없음 (구 버전 캐시)'}</b>`;
    document.getElementById('btn-export').disabled = false;
    document.getElementById('btn-rebuild').style.display = hasSource ? 'none' : 'block';
    if (!hasSource) document.getElementById('btn-rebuild').textContent = '🔄 source 태그 포함하여 재구축';
  } catch {
    el.innerHTML = `캐시: <b style="color:#E24B4A">손상됨</b>`;
    document.getElementById('btn-rebuild').style.display = 'block';
  }
}

function exportCoords() {
  const cached = localStorage.getItem(CACHE_KEY);
  if (!cached) { showMsg('캐시가 없습니다. 먼저 재구축하세요.', 'err'); return; }

  try {
    const data = JSON.parse(cached);
    const blob = new Blob([JSON.stringify(data, null, 0)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'route_coords.json';
    a.click();
    URL.revokeObjectURL(url);
    const size = (JSON.stringify(data).length / 1024).toFixed(1);
    showMsg(`✅ 내보내기 완료! (${size}KB) → data/route_coords.json 으로 이동하세요`, 'ok');
  } catch(e) {
    showMsg('내보내기 실패: ' + e.message, 'err');
  }
}

async function rebuildCoords() {
  const btn = document.getElementById('btn-rebuild');
  btn.disabled = true;
  btn.textContent = '구축 중...';
  document.getElementById('btn-export').disabled = true;
  document.getElementById('msg').style.display = 'none';

  localStorage.removeItem(CACHE_KEY);
  STATE.routeCoords.clear();

  // progress 모니터링
  const prog = document.getElementById('progress');
  const observer = new MutationObserver(() => {
    const el = document.getElementById('build-progress');
    if (el) prog.textContent = el.textContent;
  });
  observer.observe(document.body, { childList: true, subtree: true, characterData: true });

  await buildRouteCoords();
  observer.disconnect();
  prog.textContent = '';

  btn.disabled = false;
  btn.textContent = '🔄 재구축 완료 — 다시 내보내기';
  updateStat();
  showMsg('구축 완료! 이제 내보내기 버튼을 눌러주세요.', 'ok');
}

// 초기화
document.addEventListener('DOMContentLoaded', () => {
  loadData().then(updateStat);
});
</script>
</body>
</html>
