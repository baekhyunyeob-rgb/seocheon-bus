<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="서천버스">
<meta name="theme-color" content="#1D9E75">
<title>슬기로운 대중교통 생활</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ==================== 홈 화면 ==================== -->
  <div id="screen-home" class="screen active">
    <div style="position:relative;flex:1;min-height:0">
      <div id="map-home" class="map-container" style="height:100%"></div>
      <button class="my-loc-btn" onclick="goToMyLocation()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="#185FA5" stroke-width="1.5"/><path d="M8 1v2.5M8 12.5V15M1 8h2.5M12.5 8H15" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="home-sheet">
      <!-- 입력 트랙 -->
      <div class="loc-track-wrap">
        <div class="loc-track">
          <div class="loc-dot start"></div>
          <div class="loc-vline"></div>
          <!-- 경유지 행 (숨김) -->
          <div id="via-dot-wrap" style="display:none;flex-direction:column;align-items:center">
            <div class="loc-dot via"></div>
            <div class="loc-vline"></div>
          </div>
          <div class="loc-dot end"></div>
        </div>
        <div class="loc-inputs">
          <div class="loc-input" onclick="openPlaceSearch('from')">
            <span class="loc-input-text" id="text-from">현위치</span>
            <span class="gps-tag" id="tag-gps">GPS</span>
          </div>
          <div class="loc-input" id="via-row" style="display:none" onclick="openPlaceSearch('via')">
            <span class="loc-input-text placeholder" id="text-via">경유지 입력</span>
          </div>
          <div class="loc-input" onclick="openPlaceSearch('to')">
            <span class="loc-input-text placeholder" id="text-to">도착지 입력</span>
          </div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="swap-btn" onclick="swapFromTo()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M4 2v10M4 2L2 4M4 2L6 4" stroke="#888" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 12V2M10 12L8 10M10 12L12 10" stroke="#888" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
      <!-- 시간 칩 -->
      <div class="time-chips">
        <span class="time-chip active" id="chip-now"    onclick="setTimeChip('now')">지금</span>
        <span class="time-chip"        id="chip-1h"     onclick="setTimeChip('1h')">+1시간</span>
        <span class="time-chip"        id="chip-2h"     onclick="setTimeChip('2h')">+2시간</span>
        <span class="time-chip"        id="chip-custom" onclick="setTimeChip('custom')">직접입력</span>
      </div>
      <input type="time" id="custom-time" class="custom-time" onchange="STATE.search.customTime=this.value">
      <!-- 검색 버튼 + 경유지 -->
      <div class="search-row">
        <button class="search-btn" onclick="doSearch()">경로 검색</button>
        <button class="via-btn" id="via-btn" onclick="toggleVia()">+ 경유지</button>
      </div>
    </div>
    <!-- 홈 탭바 -->
    <nav class="tabbar">
      <div class="tab active" id="tab-home">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 11L11 3L19 11" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round"/><rect x="7" y="12" width="8" height="7" rx="1.2" stroke="#1D9E75" stroke-width="1.5"/></svg>
        <span>홈</span>
      </div>
      <div class="tab" onclick="showScreen('timetable')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h16M8 4V8M14 4V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>버스시간표</span>
      </div>
      <div class="tab" onclick="showScreen('routes')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="6" width="18" height="11" rx="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="14" r="2" fill="currentColor"/><circle cx="16" cy="14" r="2" fill="currentColor"/><path d="M2 10h18" stroke="currentColor" stroke-width="1.3"/></svg>
        <span>버스노선도</span>
      </div>
      <div class="tab" onclick="showScreen('transport')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="5" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="16.5" r="2" fill="currentColor"/><circle cx="16" cy="16.5" r="2" fill="currentColor"/><path d="M2 19h18" stroke="currentColor" stroke-width="1.3"/></svg>
        <span>시외버스·기차</span>
      </div>
      <div class="tab" onclick="showScreen('favorites')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.8L5.6 18.7l1-6L2.2 8.4l6.1-.9z" stroke="#EF9F27" stroke-width="1.5" stroke-linejoin="round"/></svg>
        <span>즐겨찾기</span>
      </div>
    </nav>
  </div>

  <!-- ==================== 검색결과 화면 ==================== -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <button class="back-btn" onclick="showScreen('home')">‹</button>
      <div>
        <div class="result-title" id="result-title">경로 검색결과</div>
        <div class="result-sub"   id="result-sub"></div>
      </div>
    </div>
    <div class="result-body" id="result-body"></div>
    <!-- 탭바 -->
    <nav class="tabbar">
      <div class="tab active" id="tab-result" onclick="showScreen('home')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 11L11 3L19 11" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round"/><rect x="7" y="12" width="8" height="7" rx="1.2" stroke="#1D9E75" stroke-width="1.5"/></svg>
        <span>홈</span>
      </div>
      <div class="tab" onclick="showScreen('timetable')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="#EF9F27" stroke-width="1.5"/><path d="M3 9h16M8 4V8M14 4V8" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>버스시간표</span>
      </div>
      <div class="tab" onclick="showScreen('routes')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="6" width="18" height="11" rx="2.5" stroke="#185FA5" stroke-width="1.5"/><circle cx="6" cy="14" r="2" fill="#185FA5"/><circle cx="16" cy="14" r="2" fill="#185FA5"/><path d="M2 10h18" stroke="#185FA5" stroke-width="1.3"/></svg>
        <span>버스노선도</span>
      </div>
      <div class="tab" onclick="showScreen('transport')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="5" width="18" height="10" rx="2" stroke="#7F77DD" stroke-width="1.5"/><circle cx="6" cy="16.5" r="2" fill="#7F77DD"/><circle cx="16" cy="16.5" r="2" fill="#7F77DD"/><path d="M2 19h18" stroke="#7F77DD" stroke-width="1.3"/></svg>
        <span>시외버스·기차</span>
      </div>
      <div class="tab" onclick="showScreen('favorites')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.8L5.6 18.7l1-6L2.2 8.4l6.1-.9z" fill="#EF9F27" stroke="#EF9F27" stroke-width="0.5" stroke-linejoin="round"/></svg>
        <span>즐겨찾기</span>
      </div>
    </nav>
  </div>

  <!-- ==================== 경로상세 화면 ==================== -->
  <div id="screen-detail" class="screen">
    <div id="map-detail" class="map-container" style="height:50vh">
      <!-- 뒤로가기 -->
      <button class="back-btn" style="position:absolute;top:12px;left:12px;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)" onclick="showScreen('result')">‹</button>
      <!-- 경로 카드 오버레이 -->
      <div id="detail-card" style="position:absolute;top:12px;left:52px;right:12px;background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:10"></div>
      <!-- 현위치 버튼 -->
      <button class="my-loc-btn" style="bottom:12px" onclick="if(STATE.mapDetail){STATE.mapDetail.panTo(new kakao.maps.LatLng(STATE.myLocation.lat,STATE.myLocation.lng))}">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="#185FA5" stroke-width="1.5"/><path d="M8 1v2.5M8 12.5V15M1 8h2.5M12.5 8H15" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="detail-sheet">
      <div class="stop-list" id="stop-list"></div>
    </div>
    <nav class="tabbar">
      <div class="tab active" onclick="showScreen('home')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 11L11 3L19 11" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round"/><rect x="7" y="12" width="8" height="7" rx="1.2" stroke="#1D9E75" stroke-width="1.5"/></svg>
        <span>홈</span>
      </div>
      <div class="tab" onclick="showScreen('timetable')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="#EF9F27" stroke-width="1.5"/><path d="M3 9h16M8 4V8M14 4V8" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>버스시간표</span>
      </div>
      <div class="tab" onclick="showScreen('routes')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="6" width="18" height="11" rx="2.5" stroke="#185FA5" stroke-width="1.5"/><circle cx="6" cy="14" r="2" fill="#185FA5"/><circle cx="16" cy="14" r="2" fill="#185FA5"/><path d="M2 10h18" stroke="#185FA5" stroke-width="1.3"/></svg>
        <span>버스노선도</span>
      </div>
      <div class="tab" onclick="showScreen('transport')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="5" width="18" height="10" rx="2" stroke="#7F77DD" stroke-width="1.5"/><circle cx="6" cy="16.5" r="2" fill="#7F77DD"/><circle cx="16" cy="16.5" r="2" fill="#7F77DD"/><path d="M2 19h18" stroke="#7F77DD" stroke-width="1.3"/></svg>
        <span>시외버스·기차</span>
      </div>
      <div class="tab" onclick="showScreen('favorites')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.8L5.6 18.7l1-6L2.2 8.4l6.1-.9z" fill="#EF9F27" stroke="#EF9F27" stroke-width="0.5" stroke-linejoin="round"/></svg>
        <span>즐겨찾기</span>
      </div>
    </nav>
  </div>

  <!-- ==================== 버스시간표 화면 ==================== -->
  <div id="screen-timetable" class="screen">
    <div class="tt-header">
      <div class="tt-title">버스시간표</div>
      <div class="search-bar" style="border-color:var(--border)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#888" stroke-width="1.3"/><path d="M10 10l2.5 2.5" stroke="#888" stroke-width="1.3" stroke-linecap="round"/></svg>
        <input type="text" id="stop-search-input" placeholder="정류장명 입력 (예: 서천터미널, 한산)" oninput="onStopSearchInput(this.value)" autocomplete="off">
        <button onclick="clearStopSearch()" style="background:none;border:none;color:#bbb;font-size:14px;padding:0">✕</button>
      </div>
      <div id="stop-search-results" class="tt-search-results" style="display:none"></div>
    </div>
    <div class="tt-body" id="timetable-body">
      <div style="text-align:center;padding:40px;color:var(--text-3);font-size:13px">정류장명을 검색하세요</div>
    </div>
    <nav class="tabbar">
      <div class="tab" onclick="showScreen('home')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 11L11 3L19 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><rect x="7" y="12" width="8" height="7" rx="1.2" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>홈</span>
      </div>
      <div class="tab active" id="tab-timetable">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="#EF9F27" stroke-width="1.5"/><path d="M3 9h16M8 4V8M14 4V8" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>버스시간표</span>
      </div>
      <div class="tab" onclick="showScreen('routes')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="6" width="18" height="11" rx="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="14" r="2" fill="currentColor"/><circle cx="16" cy="14" r="2" fill="currentColor"/><path d="M2 10h18" stroke="currentColor" stroke-width="1.3"/></svg>
        <span>버스노선도</span>
      </div>
      <div class="tab" onclick="showScreen('transport')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="5" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="16.5" r="2" fill="currentColor"/><circle cx="16" cy="16.5" r="2" fill="currentColor"/><path d="M2 19h18" stroke="currentColor" stroke-width="1.3"/></svg>
        <span>시외버스·기차</span>
      </div>
      <div class="tab" onclick="showScreen('favorites')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.8L5.6 18.7l1-6L2.2 8.4l6.1-.9z" fill="#EF9F27" stroke="#EF9F27" stroke-width="0.5" stroke-linejoin="round"/></svg>
        <span>즐겨찾기</span>
      </div>
    </nav>
  </div>

  <!-- ==================== 버스노선도 화면 ==================== -->
  <div id="screen-routes" class="screen">
    <div class="zone-legend">
      <div class="zone-legend-title">버스노선도</div>
      <div class="zone-pills" id="zone-pills"></div>
    </div>
    <div id="map-routes" class="map-container" style="height:220px;flex-shrink:0"></div>
    <div class="routes-list" id="route-list"></div>
    <nav class="tabbar">
      <div class="tab" onclick="showScreen('home')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 11L11 3L19 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><rect x="7" y="12" width="8" height="7" rx="1.2" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>홈</span>
      </div>
      <div class="tab" onclick="showScreen('timetable')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h16M8 4V8M14 4V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>버스시간표</span>
      </div>
      <div class="tab active" id="tab-routes">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="6" width="18" height="11" rx="2.5" stroke="#185FA5" stroke-width="1.5"/><circle cx="6" cy="14" r="2" fill="#185FA5"/><circle cx="16" cy="14" r="2" fill="#185FA5"/><path d="M2 10h18" stroke="#185FA5" stroke-width="1.3"/></svg>
        <span>버스노선도</span>
      </div>
      <div class="tab" onclick="showScreen('transport')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="5" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="16.5" r="2" fill="currentColor"/><circle cx="16" cy="16.5" r="2" fill="currentColor"/><path d="M2 19h18" stroke="currentColor" stroke-width="1.3"/></svg>
        <span>시외버스·기차</span>
      </div>
      <div class="tab" onclick="showScreen('favorites')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.8L5.6 18.7l1-6L2.2 8.4l6.1-.9z" fill="#EF9F27" stroke="#EF9F27" stroke-width="0.5" stroke-linejoin="round"/></svg>
        <span>즐겨찾기</span>
      </div>
    </nav>
  </div>

  <!-- ==================== 시외버스·기차 화면 ==================== -->
  <div id="screen-transport" class="screen">
    <div style="padding:14px 12px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">시외버스·기차</div>
      <div class="transport-tabs">
        <button class="tr-tab" id="tr-tab-pangyoStation"    onclick="showTransportTab('pangyoStation')">판교역</button>
        <button class="tr-tab" id="tr-tab-seocheonStation"  onclick="showTransportTab('seocheonStation')">서천역</button>
        <button class="tr-tab" id="tr-tab-janghangStation"  onclick="showTransportTab('janghangStation')">장항역</button>
        <button class="tr-tab" id="tr-tab-seocheonTerminal" onclick="showTransportTab('seocheonTerminal')">서천터미널</button>
        <button class="tr-tab" id="tr-tab-janghangTerminal" onclick="showTransportTab('janghangTerminal')">장항터미널</button>
      </div>
    </div>
    <div class="transport-body" id="transport-body"></div>
    <nav class="tabbar">
      <div class="tab" onclick="showScreen('home')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 11L11 3L19 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><rect x="7" y="12" width="8" height="7" rx="1.2" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>홈</span>
      </div>
      <div class="tab" onclick="showScreen('timetable')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h16M8 4V8M14 4V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>버스시간표</span>
      </div>
      <div class="tab" onclick="showScreen('routes')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="6" width="18" height="11" rx="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="14" r="2" fill="currentColor"/><circle cx="16" cy="14" r="2" fill="currentColor"/><path d="M2 10h18" stroke="currentColor" stroke-width="1.3"/></svg>
        <span>버스노선도</span>
      </div>
      <div class="tab active" id="tab-transport">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="5" width="18" height="10" rx="2" stroke="#7F77DD" stroke-width="1.5"/><circle cx="6" cy="16.5" r="2" fill="#7F77DD"/><circle cx="16" cy="16.5" r="2" fill="#7F77DD"/><path d="M2 19h18" stroke="#7F77DD" stroke-width="1.3"/></svg>
        <span>시외버스·기차</span>
      </div>
      <div class="tab" onclick="showScreen('favorites')">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.8L5.6 18.7l1-6L2.2 8.4l6.1-.9z" fill="#EF9F27" stroke="#EF9F27" stroke-width="0.5" stroke-linejoin="round"/></svg>
        <span>즐겨찾기</span>
      </div>
    </nav>
  </div>

  <!-- ==================== 즐겨찾기 화면 ==================== -->
  <div id="screen-favorites" class="screen">
    <div style="padding:14px 14px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0">
      <div style="font-size:13px;font-weight:600">즐겨찾기</div>
      <div style="font-size:11px;color:var(--text-2);margin-top:2px">탭하면 홈에서 바로 검색</div>

<!-- 앱 초기화 -->
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  initLocation();
  initRoutesScreen();
  loadKakaoMap();

  history.replaceState({ screen:'home' }, '', '');
  window.addEventListener('popstate', e => {
    const sc = e.state?.screen || 'home';
    showScreen(sc, false);
  });
});

function swapFromTo() {
  const tmp = STATE.search.from;
  STATE.search.from = STATE.search.to;
  STATE.search.to = tmp;
  renderHomeSheet();
  updateHomeMarkers();
}

function goToMyLocation() {
  if (!STATE.mapHome) return;
  const ll = new kakao.maps.LatLng(STATE.myLocation.lat, STATE.myLocation.lng);
  STATE.mapHome.panTo(ll);
  updateMyMarker(STATE.mapHome, ll);
}
</script>

<!-- REST 키 초기화 (config.js → localStorage 순으로 fallback) -->
<script>
(function() {
  const cfg = window.APP_CONFIG || {};
  const restKey = cfg.kakaoRestKey || localStorage.getItem('sc_kakao_rest_key') || '';
  if (restKey) {
    window._kakaoRestKey = restKey;
    localStorage.setItem('sc_kakao_rest_key', restKey);
  }
})();
</script>
