<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="서천버스">
<meta name="theme-color" content="#1D9E75">
<title>슬기로운 대중교통 생활</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ==================== 홈 화면 ==================== -->
  <div id="screen-home" class="screen active">
    <div style="position:relative;flex:1;min-height:0">
      <div id="map-home" class="map-container" style="height:100%"></div>
      <button class="my-loc-btn" onclick="goToMyLocation()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="#185FA5" stroke-width="1.5"/><path d="M8 1v2.5M8 12.5V15M1 8h2.5M12.5 8H15" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="home-sheet">
      <!-- 설정 버튼 -->
      <button onclick="openSettingsModal()" style="position:absolute;top:8px;right:12px;background:none;border:none;padding:4px;cursor:pointer;z-index:5;color:var(--text-2)" title="앱 설정">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.1 3.1l1.4 1.4M13.5 13.5l1.4 1.4M3.1 14.9l1.4-1.4M13.5 4.5l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <!-- 입력 트랙 -->
      <div class="loc-track-wrap">
        <div class="loc-track">
          <div class="loc-dot start"></div>
          <div class="loc-vline"></div>
          <!-- 경유지 행 (숨김) -->
          <div id="via-dot-wrap" style="display:none;flex-direction:column;align-items:center">
            <div class="loc-dot via"></div>
            <div class="loc-vline"></div>
          </div>
          <div class="loc-dot end"></div>
        </div>
        <div class="loc-inputs">
          <div class="loc-input" onclick="openPlaceSearch('from')">
            <span class="loc-input-text" id="text-from">현위치</span>
            <span class="gps-tag" id="tag-gps">GPS</span>
          </div>
          <div class="loc-input" id="via-row" style="display:none" onclick="openPlaceSearch('via')">
            <span class="loc-input-text placeholder" id="text-via">경유지 입력</span>
          </div>
          <div class="loc-input" onclick="openPlaceSearch('to')">
            <span class="loc-input-text placeholder" id="text-to">도착지 입력</span>
          </div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="swap-btn" onclick="swapFromTo()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M4 2v10M4 2L2 4M4 2L6 4" stroke="#888" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 12V2M10 12L8 10M10 12L12 10" stroke="#888" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
      <!-- 시간 칩 -->
      <div class="time-chips">
        <span class="time-chip active" id="chip-now"    onclick="setTimeChip('now')">지금</span>
        <span class="time-chip"        id="chip-1h"     onclick="setTimeChip('1h')">+1시간</span>
        <span class="time-chip"        id="chip-2h"     onclick="setTimeChip('2h')">+2시간</span>
        <span class="time-chip"        id="chip-custom" onclick="setTimeChip('custom')">직접입력</span>
      </div>
      <input type="time" id="custom-time" class="custom-time" onchange="STATE.search.customTime=this.value">
      <!-- 검색 버튼 + 경유지 -->
      <div class="search-row">
        <button class="search-btn" onclick="doSearch()">경로 검색</button>
        <button class="via-btn" id="via-btn" onclick="toggleVia()">+ 경유지</button>
      </div>
    </div>
    <!-- 홈 탭바 -->
    <nav class="tabbar" id="tabbar-home"></nav>
  </div>

  <!-- ==================== 검색결과 화면 ==================== -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <button class="back-btn" onclick="showScreen('home')">‹</button>
      <div>
        <div class="result-title" id="result-title">경로 검색결과</div>
        <div class="result-sub"   id="result-sub"></div>
      </div>
    </div>
    <div class="result-body" id="result-body"></div>
    <!-- 탭바 -->
    <nav class="tabbar" id="tabbar-result"></nav>
  </div>

  <!-- ==================== 경로상세 화면 ==================== -->
  <div id="screen-detail" class="screen">
    <div id="map-detail" class="map-container" style="height:50vh">
      <!-- 뒤로가기 -->
      <button class="back-btn" style="position:absolute;top:12px;left:12px;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)" onclick="showScreen('result')">‹</button>
      <!-- 경로 카드 오버레이 -->
      <div id="detail-card" style="position:absolute;top:12px;left:52px;right:12px;background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:10"></div>
      <!-- 현위치 버튼 -->
      <button class="my-loc-btn" style="bottom:12px" onclick="goToMyLocationDetail()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="#185FA5" stroke-width="1.5"/><path d="M8 1v2.5M8 12.5V15M1 8h2.5M12.5 8H15" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="detail-sheet">
      <div class="stop-list" id="stop-list"></div>
    </div>
    <nav class="tabbar" id="tabbar-detail"></nav>
  </div>

  <!-- ==================== 버스시간표 화면 ==================== -->
  <div id="screen-timetable" class="screen">
    <div class="tt-header">
      <div class="tt-title">버스시간표</div>
      <div class="search-bar" style="border-color:var(--border)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#888" stroke-width="1.3"/><path d="M10 10l2.5 2.5" stroke="#888" stroke-width="1.3" stroke-linecap="round"/></svg>
        <input type="text" id="stop-search-input" placeholder="정류장명 입력 (예: 서천터미널, 한산)" oninput="onStopSearchInput(this.value)" autocomplete="off">
        <button onclick="clearStopSearch()" style="background:none;border:none;color:#bbb;font-size:14px;padding:0">✕</button>
      </div>
      <div id="stop-search-results" class="tt-search-results" style="display:none"></div>
    </div>
    <div class="tt-body" id="timetable-body">
      <div style="text-align:center;padding:40px;color:var(--text-3);font-size:13px">정류장명을 검색하세요</div>
    </div>
    <nav class="tabbar" id="tabbar-timetable"></nav>
  </div>

  <!-- ==================== 버스노선도 화면 ==================== -->
  <div id="screen-routes" class="screen">
    <div class="zone-legend">
      <div class="zone-legend-title">버스노선도</div>
      <div class="zone-pills" id="zone-pills"></div>
    </div>
    <div id="map-routes" class="map-container" style="height:220px;flex-shrink:0"></div>
    <div class="routes-list" id="route-list"></div>
    <nav class="tabbar" id="tabbar-routes"></nav>
  </div>

  <!-- ==================== 시외버스·기차 화면 ==================== -->
  <div id="screen-transport" class="screen">
    <div style="padding:14px 12px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">시외버스·기차</div>
      <div class="transport-tabs">
        <button class="tr-tab" id="tr-tab-pangyoStation"    onclick="showTransportTab('pangyoStation')">판교역</button>
        <button class="tr-tab" id="tr-tab-seocheonStation"  onclick="showTransportTab('seocheonStation')">서천역</button>
        <button class="tr-tab" id="tr-tab-janghangStation"  onclick="showTransportTab('janghangStation')">장항역</button>
        <button class="tr-tab" id="tr-tab-seocheonTerminal" onclick="showTransportTab('seocheonTerminal')">서천터미널</button>
        <button class="tr-tab" id="tr-tab-janghangTerminal" onclick="showTransportTab('janghangTerminal')">장항터미널</button>
      </div>
    </div>
    <div class="transport-body" id="transport-body"></div>
    <nav class="tabbar" id="tabbar-transport"></nav>
  </div>

  <!-- ==================== 즐겨찾기 화면 ==================== -->
  <div id="screen-favorites" class="screen">
    <div style="padding:14px 14px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0">
      <div style="font-size:13px;font-weight:600">즐겨찾기</div>
      <div style="font-size:11px;color:var(--text-2);margin-top:2px">탭하면 홈에서 바로 검색</div>
    </div>
    <div class="fav-body" id="favorites-body"></div>
    <nav class="tabbar" id="tabbar-favorites"></nav>
  </div>

  <!-- ==================== 장소 검색 모달 ==================== -->
  <div id="place-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closePlaceModal()">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">장소 검색</span>
        <button class="modal-close" onclick="closePlaceModal()">✕</button>
      </div>
      <input type="text" class="modal-input" id="place-input" placeholder="정류장명 또는 장소 입력" oninput="onPlaceInput(this.value)" autocomplete="off">
      <div class="modal-scroll">
        <div id="modal-results"></div>
        <div id="modal-saved"></div>
      </div>
    </div>
  </div>

  <!-- ==================== 키 설정 모달 ==================== -->
  <div id="settings-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeSettingsModal()">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">⚙ 앱 설정</span>
        <button class="modal-close" onclick="closeSettingsModal()">✕</button>
      </div>
      <div class="modal-scroll" style="padding:12px 14px">
        <p style="font-size:12px;color:var(--text-2);line-height:1.6;margin:0 0 14px">
          카카오 개발자 콘솔에서 발급받은 키를 입력하세요.<br>
          키는 이 기기에만 저장되며 서버로 전송되지 않습니다.
        </p>
        <div style="margin-bottom:12px">
          <label style="font-size:11px;font-weight:600;color:var(--text-2)">JavaScript 앱 키 (지도 표시용)</label>
          <input type="text" id="settings-js-key" class="modal-input" placeholder="예: ea4bdbbdf5c627ab..." style="margin-top:5px">
        </div>
        <div style="margin-bottom:16px">
          <label style="font-size:11px;font-weight:600;color:var(--text-2)">REST API 키 (경로 탐색용)</label>
          <input type="text" id="settings-rest-key" class="modal-input" placeholder="예: a0aa52b4b6223f8d..." style="margin-top:5px">
        </div>
        <button onclick="saveSettings()" style="width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">저장 후 앱 재시작</button>
        <div id="settings-msg" style="font-size:12px;color:#0F6E56;text-align:center;margin-top:8px;display:none"></div>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<!-- JS 모듈 -->
<script src="js/data.js"></script>
<script src="js/routeCoords.js"></script>
<script src="js/search.js"></script>
<script src="js/maps.js"></script>
<script src="js/ui.js"></script>
<script src="js/screens.js"></script>

<!-- 앱 초기화 -->
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  renderAllTabbars();  // 탭바 최초 렌더링
  initLocation();
  initRoutesScreen();
  loadKakaoMap();

  history.replaceState({ screen:'home' }, '', '');
  window.addEventListener('popstate', e => {
    const sc = e.state?.screen || 'home';
    showScreen(sc, false);
  });
});

function swapFromTo() {
  const tmp = STATE.search.from;
  STATE.search.from = STATE.search.to;
  STATE.search.to = tmp;
  renderHomeSheet();
  updateHomeMarkers();
}

function goToMyLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    STATE.myLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    STATE.gpsReady = true;
    if (STATE.mapHome) {
      const ll = new kakao.maps.LatLng(STATE.myLocation.lat, STATE.myLocation.lng);
      STATE.mapHome.panTo(ll);
      updateMyMarker(STATE.mapHome, ll);
    }
    if (!isInSeocheon(STATE.myLocation.lat, STATE.myLocation.lng)) showOutOfArea();
    else {
      const ex = document.getElementById('out-of-area');
      if (ex) ex.remove();
    }
  }, () => {
    // GPS 실패 시 기존 위치로 이동
    if (STATE.mapHome && STATE.myLocation) {
      STATE.mapHome.panTo(new kakao.maps.LatLng(STATE.myLocation.lat, STATE.myLocation.lng));
    }
  });
}
</script>

<!-- 카카오맵 SDK — JS 키를 localStorage(sc_kakao_js_key)에서 동적 로드 -->
<script>
(function() {
  const jsKey = localStorage.getItem('sc_kakao_js_key') || '';
  if (!jsKey) {
    console.warn('카카오맵 JS 키가 없습니다. 앱 설정(⚙)에서 키를 입력해 주세요.');
    return;
  }
  const s = document.createElement('script');
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${jsKey}&autoload=false&libraries=services,clusterer`;
  document.head.appendChild(s);
})();
</script>

<!-- 저장된 카카오 키 불러오기 -->
<script>
window.addEventListener('DOMContentLoaded', () => {
  const savedRest = localStorage.getItem('sc_kakao_rest_key');
  if (savedRest) window._kakaoRestKey = savedRest;
});
</script>

</body>
</html>
