<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="서천버스">
<meta name="theme-color" content="#1D9E75">
<title>슬기로운 서천생활</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 앱 래퍼 -->
<div id="app">

  <!-- ==================== 홈 화면 ==================== -->
  <div id="screen-home" class="screen active">
    <div id="map-home" class="map-container"></div>
    <!-- 검색 시트 -->
    <div class="bottom-sheet" id="search-sheet">
      <div class="sheet-handle"></div>
      <!-- 출발지 -->
      <div class="loc-row">
        <div class="loc-track">
          <div class="loc-dot dot-start"></div>
          <div class="loc-vline"></div>
        </div>
        <div class="loc-input" id="input-from" onclick="openPlaceSearch('from')">
          <span class="loc-text" id="text-from">현위치</span>
          <span class="loc-tag tag-gps" id="tag-from">GPS</span>
        </div>
      </div>
      <!-- 경유지 (기본 숨김) -->
      <div class="loc-row" id="via-row" style="display:none">
        <div class="loc-track">
          <div class="loc-dot dot-via"></div>
          <div class="loc-vline"></div>
        </div>
        <div class="loc-input" id="input-via" onclick="openPlaceSearch('via')">
          <span class="loc-text" id="text-via">경유지 입력</span>
          <span class="loc-tag tag-via">경유</span>
        </div>
      </div>
      <!-- 도착지 -->
      <div class="loc-row">
        <div class="loc-track">
          <div class="loc-dot dot-end"></div>
        </div>
        <div class="loc-input" id="input-to" onclick="openPlaceSearch('to')">
          <span class="loc-text loc-placeholder" id="text-to">도착지 입력 또는 선택</span>
        </div>
      </div>
      <!-- 경유지 추가 버튼 -->
      <div class="add-via-btn" id="add-via-btn" onclick="toggleVia()">+ 경유지 추가</div>
      <!-- 시간 선택 -->
      <div class="time-row">
        <span class="time-label">출발</span>
        <div class="time-chips">
          <span class="time-chip active" id="chip-now" onclick="setTimeChip('now')">지금</span>
          <span class="time-chip" id="chip-1h" onclick="setTimeChip('1h')">+1시간</span>
          <span class="time-chip" id="chip-2h" onclick="setTimeChip('2h')">+2시간</span>
          <span class="time-chip" id="chip-custom" onclick="setTimeChip('custom')">직접입력</span>
        </div>
      </div>
      <!-- 직접입력 시간 -->
      <input type="time" id="custom-time" class="custom-time-input" style="display:none" onchange="onCustomTime(this.value)">
      <!-- 검색 버튼 -->
      <button class="search-btn" onclick="searchRoute()">경로 검색</button>
    </div>
  </div>

  <!-- ==================== 검색결과 화면 ==================== -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <button class="back-btn" onclick="showScreen('home')">‹</button>
      <div>
        <div class="result-title" id="result-title">경로 검색결과</div>
        <div class="result-sub" id="result-sub"></div>
      </div>
    </div>
    <div class="result-body" id="result-body"></div>
  </div>

  <!-- ==================== 경로상세 화면 ==================== -->
  <div id="screen-detail" class="screen">
    <div id="map-detail" class="map-container" style="height:45vh"></div>
    <div class="bottom-sheet-detail">
      <div class="sheet-handle"></div>
      <div class="bus-live-bar" id="bus-live-bar">
        <div class="bus-live-top">
          <span class="bus-live-name" id="live-bus-name">버스 정보</span>
          <span class="live-badge">LIVE</span>
        </div>
        <div class="bus-live-status" id="live-bus-status"></div>
      </div>
      <div class="stop-list" id="stop-list"></div>
    </div>
  </div>

  <!-- ==================== 노선도 화면 ==================== -->
  <div id="screen-routes" class="screen">
    <div class="page-header green">
      <div class="page-title">서천 버스 노선도</div>
      <div class="page-sub">권역 선택 → 노선 선택 → 시간표</div>
    </div>
    <div class="zone-tabs" id="zone-tabs"></div>
    <div id="map-routes" class="map-container" style="height:200px"></div>
    <div class="legend-bar" id="legend-bar"></div>
    <div class="route-list" id="route-list"></div>
  </div>

  <!-- ==================== 고속·기차 화면 ==================== -->
  <div id="screen-transport" class="screen">
    <div class="page-header green">
      <div class="page-title">고속버스 · 기차</div>
      <div class="page-sub">현위치 기준 터미널·역 선택</div>
    </div>
    <div class="hub-grid" id="hub-grid"></div>
    <div class="hub-detail" id="hub-detail" style="display:none"></div>
  </div>

  <!-- ==================== 즐겨찾기 화면 ==================== -->
  <div id="screen-favorites" class="screen">
    <div class="page-header green">
      <div class="page-title">즐겨찾기</div>
      <div class="page-sub">탭하면 홈에서 바로 검색</div>
    </div>
    <div id="favorites-body"></div>
  </div>

  <!-- ==================== 장소 검색 모달 ==================== -->
  <div id="place-modal" class="modal" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">장소 검색</span>
        <button class="modal-close" onclick="closePlaceModal()">✕</button>
      </div>
      <input type="text" class="modal-input" id="place-input" placeholder="정류장명 또는 장소 입력" oninput="onPlaceInput(this.value)" autocomplete="off">
      <div class="modal-results" id="modal-results"></div>
      <div class="modal-saved" id="modal-saved"></div>
    </div>
  </div>

  <!-- ==================== 탭바 ==================== -->
  <nav class="tabbar">
    <div class="tab active" id="tab-home" onclick="showScreen('home')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M2 11l9-9 9 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <rect x="6" y="12" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <rect x="9" y="14" width="4" height="6" rx=".5" fill="currentColor"/>
      </svg>
      <span>홈</span>
    </div>
    <div class="tab" id="tab-routes" onclick="showScreen('routes')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M2 5h18M2 11h11M2 17h13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <polyline points="16,12 19,15 16,18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>노선도</span>
    </div>
    <div class="tab" id="tab-transport" onclick="showScreen('transport')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="8" width="11" height="7" rx="2" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="3.5" cy="15" r="1.2" fill="currentColor"/>
        <circle cx="9.5" cy="15" r="1.2" fill="currentColor"/>
        <path d="M12 11.5l3.5-2.5 5 2.5v6H12v-6z" stroke="currentColor" stroke-width="1.3"/>
        <path d="M16.5 11.5V9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span style="font-size:9px">고속·기차</span>
    </div>
    <div class="tab" id="tab-favorites" onclick="showScreen('favorites')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M11 2.5l2.4 5.2 5.1.7-3.7 3.7.9 5.4L11 15l-4.7 2.5.9-5.4-3.7-3.7 5.1-.7L11 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span>즐겨찾기</span>
    </div>
  </nav>

</div>

<script src="data/routes.json" type="application/json" id="routes-data"></script>
<script src="js/app.js"></script>
<!-- 카카오맵 SDK -->

</body>
</html>
