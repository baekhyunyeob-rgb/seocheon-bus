<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서천 노선 검증 도구</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f0f2f5; }
.header {
  background: #185FA5; color: #fff; padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 14px; font-weight: 700; }
.layout { display: flex; height: calc(100vh - 42px); }

/* 좌측 노선 목록 */
.route-panel {
  width: 220px; flex-shrink: 0; background: #fff;
  border-right: 1px solid #e0e0e0; overflow-y: auto;
}
.route-group { padding: 6px 10px 2px; font-size: 10px; font-weight: 700; color: #aaa; background: #f8f8f8; border-bottom: .5px solid #eee; }
.route-item {
  padding: 8px 12px; border-bottom: .5px solid #f5f5f5;
  cursor: pointer; font-size: 12px; transition: background .1s;
  display: flex; align-items: center; gap: 6px;
}
.route-item:hover { background: #f0f5ff; }
.route-item.active { background: #e6f0ff; font-weight: 700; }
.route-item.verified { border-left: 3px solid #1D9E75; }
.route-item.error    { border-left: 3px solid #E24B4A; }
.route-num { font-size: 11px; font-weight: 800; background: #185FA5; color: #fff; padding: 2px 6px; border-radius: 4px; min-width: 32px; text-align: center; }
.route-name { font-size: 11px; color: #555; }

/* 지도 */
.map-panel { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* 우측 정보 패널 */
.info-panel {
  width: 260px; flex-shrink: 0; background: #fff;
  border-left: 1px solid #e0e0e0; overflow-y: auto;
  display: flex; flex-direction: column;
}
.info-header { padding: 12px; border-bottom: 1px solid #f0f0f0; }
.info-num { font-size: 18px; font-weight: 800; color: #185FA5; }
.info-name { font-size: 12px; color: #555; margin-top: 2px; }
.info-route { font-size: 11px; color: #888; margin-top: 4px; background: #f8f8f8; padding: 4px 8px; border-radius: 6px; line-height: 1.6; }

.waypoints { flex: 1; overflow-y: auto; padding: 8px; }
.wp-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 8px; border-radius: 7px; margin-bottom: 3px;
  cursor: pointer; transition: background .1s;
}
.wp-item:hover { background: #f5f5f5; }
.wp-item.matched   { background: #f0faf5; }
.wp-item.unmatched { background: #fff5f5; }
.wp-idx {
  width: 22px; height: 22px; border-radius: 50%;
  background: #185FA5; color: #fff; font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.wp-idx.unmatched { background: #E24B4A; }
.wp-info { flex: 1; }
.wp-route-name { font-size: 12px; font-weight: 700; color: #111; }
.wp-stop-name  { font-size: 10px; color: #1D9E75; margin-top: 1px; }
.wp-stop-name.unmatched { color: #E24B4A; }
.wp-dist { font-size: 10px; color: #aaa; }

.actions { padding: 10px; border-top: 1px solid #f0f0f0; display: flex; gap: 6px; }
.btn { flex: 1; padding: 8px; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-ok  { background: #1D9E75; color: #fff; }
.btn-err { background: #E24B4A; color: #fff; }
.btn-save { background: #185FA5; color: #fff; font-size: 11px; padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }

.stats { font-size: 11px; color: rgba(255,255,255,.8); }
</style>
</head>
<body>

<div class="header">
  <h1>🗺 서천 노선 검증 도구</h1>
  <div class="stats" id="stats">-</div>
  <button class="btn-save" onclick="downloadResult()" style="margin-left:auto">💾 저장</button>
</div>

<div class="layout">
  <!-- 노선 목록 -->
  <div class="route-panel" id="route-panel"></div>

  <!-- 지도 -->
  <div class="map-panel"><div id="map"></div></div>

  <!-- 정보 패널 -->
  <div class="info-panel">
    <div class="info-header" id="info-header">
      <div style="color:#aaa;font-size:13px">노선을 선택하세요</div>
    </div>
    <div class="waypoints" id="waypoints">
      <div style="text-align:center;padding:30px;color:#bbb;font-size:12px">
        좌측에서 노선을 선택하면<br>경유 정류장이 표시돼요
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-ok"  onclick="markRoute('ok')">✓ 정상</button>
      <button class="btn btn-err" onclick="markRoute('error')">✗ 오류</button>
    </div>
  </div>
</div>

let currentRouteIdx = -1;
let results = {};

// stops 이름 인덱스
const stopByName = {};
STOPS.forEach(s => {
  if (!stopByName[s.name]) stopByName[s.name] = [];
  stopByName[s.name].push(s);
});

// 이름 유사 매칭
function findStop(name) {
  name = name.trim();
  // 완전 일치
  if (stopByName[name]) return { stop: stopByName[name][0], exact: true };
  // 부분 일치
  const keys = Object.keys(stopByName);
  let best = null, bestScore = 0;
  for (const k of keys) {
    if (k.includes(name) || name.includes(k)) {
      const score = Math.min(name.length, k.length) / Math.max(name.length, k.length);
      if (score > bestScore) { bestScore = score; best = k; }
    }
  }
  if (best && bestScore > 0.4) return { stop: stopByName[best][0], exact: false, matchedName: best, score: bestScore };
  return null;
}

function dist(la1,ln1,la2,ln2) {
  return Math.sqrt(Math.pow((la1-la2)*111000,2)+Math.pow((ln1-ln2)*88000,2));
}

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(36.0758, 126.6908),
    level: 9
  });

  // 1084개 정류장 전체 작은 점으로 표시
  STOPS.forEach(s => {
    const marker = new kakao.maps.Circle({
      center: new kakao.maps.LatLng(s.lat, s.lng),
      radius: 15,
      strokeWeight: 1, strokeColor: '#185FA5', strokeOpacity: 0.5,
      fillColor: '#185FA5', fillOpacity: 0.3,
      map
    });
    allStopMarkers.push(marker);
  });
}

function renderRouteList() {
  const saved = localStorage.getItem('route_verify_v1');
  if (saved) results = JSON.parse(saved);

  const panel = document.getElementById('route-panel');
  const parseable = ROUTES.filter(r => r['경유'] && !r['경유'].includes('↔') && !r['경유'].includes('('));
  const unparseable = ROUTES.filter(r => r['경유'] && (r['경유'].includes('↔') || r['경유'].includes('(')));

  let html = '<div class="route-group">→ 파싱 가능 (' + parseable.length + '개)</div>';
  parseable.forEach((r, i) => {
    const idx = ROUTES.indexOf(r);
    const status = results[r['번호']]?.status || '';
    html += '<div class="route-item ' + status + '" onclick="selectRoute(' + idx + ')">' +
      '<span class="route-num">' + r['번호'] + '</span>' +
      '<span class="route-name">' + r['기점'].slice(0,4) + '↔' + r['종점'].slice(0,4) + '</span>' +
      '</div>';
  });

  html += '<div class="route-group">↔ 파싱 불가 (' + unparseable.length + '개)</div>';
  unparseable.forEach(r => {
    const idx = ROUTES.indexOf(r);
    const status = results[r['번호']]?.status || '';
    html += '<div class="route-item ' + status + '" onclick="selectRoute(' + idx + ')">' +
      '<span class="route-num" style="background:#888">' + r['번호'] + '</span>' +
      '<span class="route-name">' + r['기점'].slice(0,4) + '↔' + r['종점'].slice(0,4) + '</span>' +
      '</div>';
  });

  panel.innerHTML = html;
  updateStats();
}

function selectRoute(idx) {
  currentRouteIdx = idx;
  const route = ROUTES[idx];

  // 활성 표시
  document.querySelectorAll('.route-item').forEach((el, i) => {
    el.classList.toggle('active', el.querySelector('.route-num')?.textContent === route['번호']);
  });

  // 기존 마커/폴리라인 제거
  routeMarkers.forEach(m => { if (m.setMap) m.setMap(null); });
  routeMarkers = [];
  if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }

  // 경유지 추출
  const viaStr = route['경유'] || '';
  let waypointNames = [];
  if (!viaStr.includes('↔') && !viaStr.includes('(')) {
    waypointNames = [route['기점'], ...viaStr.split('→').map(s=>s.trim()).filter(Boolean), route['종점']];
  } else {
    waypointNames = [route['기점'], route['종점']];
  }

  // 매칭 + 마커
  const bounds = new kakao.maps.LatLngBounds();
  const polyPath = [];
  let wpHtml = '';
  const matchResults = [];

  waypointNames.forEach((name, i) => {
    const match = findStop(name);
    const num = i + 1;

    if (match) {
      const s = match.stop;
      const latlng = new kakao.maps.LatLng(s.lat, s.lng);
      bounds.extend(latlng);
      polyPath.push(latlng);

      // 번호 마커 (커스텀 오버레이)
      const color = match.exact ? '#185FA5' : '#EF9F27';
      const overlay = new kakao.maps.CustomOverlay({
        position: latlng,
        content: '<div style="background:' + color + ';color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)">' + num + '</div>',
        map,
        zIndex: 10
      });
      routeMarkers.push(overlay);

      const d = dist(s.lat, s.lng, s.lat, s.lng);
      matchResults.push({ name, match, exact: match.exact });

      wpHtml += '<div class="wp-item ' + (match.exact ? 'matched' : '') + '">' +
        '<div class="wp-idx ' + (match.exact ? '' : '') + '" style="background:' + color + '">' + num + '</div>' +
        '<div class="wp-info">' +
          '<div class="wp-route-name">' + name + '</div>' +
          '<div class="wp-stop-name ' + (match.exact ? '' : '') + '">' +
            (match.exact ? '✓ ' : '⚠ ') + (match.matchedName || name) +
          '</div>' +
        '</div>' +
        '</div>';
    } else {
      matchResults.push({ name, match: null });
      wpHtml += '<div class="wp-item unmatched">' +
        '<div class="wp-idx unmatched">' + num + '</div>' +
        '<div class="wp-info">' +
          '<div class="wp-route-name">' + name + '</div>' +
          '<div class="wp-stop-name unmatched">✗ 매칭 없음</div>' +
        '</div>' +
        '</div>';
    }
  });

  // 폴리라인
  if (polyPath.length >= 2) {
    routePolyline = new kakao.maps.Polyline({
      path: polyPath, strokeWeight: 3,
      strokeColor: '#185FA5', strokeOpacity: 0.8,
      strokeStyle: 'solid', map
    });
  }

  // 지도 범위 조정
  if (!bounds.isEmpty()) map.setBounds(bounds, 40);

  // 정보 패널
  const unmatched = matchResults.filter(m => !m.match).length;
  const approx    = matchResults.filter(m => m.match && !m.exact).length;

  document.getElementById('info-header').innerHTML =
    '<div class="info-num">' + route['번호'] + '</div>' +
    '<div class="info-name">' + route['노선군'] + '</div>' +
    '<div class="info-route">' + route['기점'] + ' → ' + route['종점'] + '<br>' +
      '<span style="color:' + (unmatched>0?'#E24B4A':'#1D9E75') + '">✗ 미매칭 ' + unmatched + '개</span> · ' +
      '<span style="color:#EF9F27">⚠ 근사 ' + approx + '개</span>' +
    '</div>';

  document.getElementById('waypoints').innerHTML = wpHtml;
}

function markRoute(status) {
  if (currentRouteIdx < 0) return;
  const route = ROUTES[currentRouteIdx];
  results[route['번호']] = { status, time: Date.now() };
  localStorage.setItem('route_verify_v1', JSON.stringify(results));
  renderRouteList();

  // 다음 노선으로
  if (currentRouteIdx < ROUTES.length - 1) selectRoute(currentRouteIdx + 1);
}

function updateStats() {
  const ok  = Object.values(results).filter(r => r.status==='ok').length;
  const err = Object.values(results).filter(r => r.status==='error').length;
  document.getElementById('stats').textContent =
    '정상 ' + ok + ' · 오류 ' + err + ' · 미확인 ' + (ROUTES.length - ok - err);
}

function downloadResult() {
  const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'route_verify_result.json'; a.click();
}

const script = document.createElement('script');
script.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + KAKAO_KEY + '&autoload=false';
script.onload = function() {
  kakao.maps.load(function() {
    initMap();
    renderRouteList();
  });
};
document.head.appendChild(script);
</script>
