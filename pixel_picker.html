<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>참조점 픽셀 좌표 측정기</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f1117; color:#e8eaf0; font-family:'Noto Sans KR',sans-serif; display:flex; flex-direction:column; height:100vh; }

  #toolbar {
    background:#1a1d2e; border-bottom:1px solid #2a2d3e;
    padding:12px 20px; display:flex; align-items:center; gap:20px; flex-shrink:0;
  }
  #toolbar h1 { font-size:15px; font-weight:700; }
  #toolbar p { font-size:12px; color:#6b7280; }

  #main { display:flex; flex:1; overflow:hidden; }

  #canvas-wrap {
    flex:1; overflow:scroll; background:#0a0c14; cursor:crosshair;
    display:block;
    scrollbar-width:thin; scrollbar-color:#2a2d3e #0a0c14;
  }
  #canvas-wrap::-webkit-scrollbar { width:10px; height:10px; }
  #canvas-wrap::-webkit-scrollbar-track { background:#0a0c14; }
  #canvas-wrap::-webkit-scrollbar-thumb { background:#2a2d3e; border-radius:4px; }
  #canvas-wrap::-webkit-scrollbar-corner { background:#0a0c14; }

  #canvas { display:block; }

  #panel {
    width:300px; background:#1a1d2e; border-left:1px solid #2a2d3e;
    padding:16px; overflow-y:auto; flex-shrink:0;
  }

  .gcp-card {
    background:#0f1117; border:1px solid #2a2d3e; border-radius:10px;
    padding:14px; margin-bottom:12px; cursor:pointer; transition:all 0.2s;
  }
  .gcp-card:hover { border-color:#3b82f6; }
  .gcp-card.active { border-color:#3b82f6; background:#0d1525; }
  .gcp-card.done { border-color:#10b981; }

  .gcp-name { font-size:13px; font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .gcp-num { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }

  .gcp-pixel { font-size:11px; color:#6b7280; font-family:monospace; }
  .gcp-pixel span { color:#f59e0b; }
  .gcp-latlng { font-size:11px; color:#6b7280; font-family:monospace; margin-top:3px; }
  .gcp-latlng span { color:#10b981; }

  .hint { font-size:11px; color:#4b5563; margin-top:4px; }

  #cursor-pos {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:rgba(26,29,46,0.95); border:1px solid #2a2d3e;
    padding:6px 16px; border-radius:20px; font-size:12px; font-family:monospace;
    pointer-events:none; z-index:100;
  }

  #output-section {
    margin-top:20px; padding-top:16px; border-top:1px solid #2a2d3e;
  }
  #output-section h3 { font-size:12px; color:#6b7280; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  #output-box {
    background:#0f1117; border:1px solid #2a2d3e; border-radius:8px;
    padding:10px; font-size:11px; font-family:monospace; color:#10b981;
    white-space:pre-wrap; min-height:80px; line-height:1.7;
  }

  #copy-btn {
    margin-top:8px; width:100%; padding:8px;
    background:#3b82f6; border:none; border-radius:8px;
    color:#fff; font-size:12px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  #copy-btn:hover { background:#2563eb; }

  #zoom-ctrl { display:flex; gap:8px; align-items:center; margin-left:auto; }
  .zbtn { background:#0f1117; border:1px solid #2a2d3e; color:#d1d5db; width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:14px; }
  .zbtn:hover { border-color:#3b82f6; color:#3b82f6; }
  #zoom-label { font-size:12px; color:#6b7280; min-width:36px; text-align:center; }

  #upload-btn {
    background:#10b981; border:none; border-radius:8px; color:#fff;
    padding:7px 14px; font-size:12px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div>
    <h1>📍 참조점 픽셀 좌표 측정기</h1>
    <p>노선도 이미지를 올리고 4개 참조점을 클릭하세요</p>
  </div>
  <label id="upload-btn">
    이미지 업로드
    <input type="file" accept="image/*" style="display:none" onchange="loadImage(event)">
  </label>
  <div id="zoom-ctrl">
    <button class="zbtn" onclick="zoom(-0.25)">−</button>
    <span id="zoom-label">100%</span>
    <button class="zbtn" onclick="zoom(0.25)">+</button>
  </div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="panel">
    <p style="font-size:12px;color:#6b7280;margin-bottom:14px;">
      카드를 선택 후 이미지에서 해당 지점을 클릭하세요
    </p>

    <div id="gcp-list"></div>

    <div id="output-section">
      <h3>측정 결과 (복사용)</h3>
      <div id="output-box">측정 완료 후 표시됩니다...</div>
      <button id="copy-btn" onclick="copyOutput()">📋 결과 복사</button>
    </div>
  </div>
</div>

<div id="cursor-pos">마우스를 이미지 위에 올려주세요</div>

<script>
const GCPS = [
  { id:0, name:'홍산면사무소', color:'#ef4444', lat:36.2069, lng:126.8728, px:null, py:null },
  { id:1, name:'입포하나로마트', color:'#3b82f6', lat:36.1978, lng:126.9653, px:null, py:null },
  { id:2, name:'신흥아파트',    color:'#10b981', lat:36.0334, lng:126.7098, px:null, py:null },
  { id:3, name:'홍원항',        color:'#f59e0b', lat:36.1342, lng:126.5273, px:null, py:null },
];

let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let img = null;
let scale = 1.0;
let activeGCP = 0;

function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    applyScale();
    redraw();
  };
  img.src = url;
}

function applyScale() {
  canvas.style.width = (img.width * scale) + 'px';
  canvas.style.height = (img.height * scale) + 'px';
}

function zoom(delta) {
  scale = Math.max(0.25, Math.min(3.0, scale + delta));
  document.getElementById('zoom-label').textContent = Math.round(scale*100) + '%';
  if (img) applyScale();
}

function redraw() {
  if (!img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);

  GCPS.forEach((gcp, i) => {
    if (gcp.px === null) return;
    // 십자선
    ctx.strokeStyle = gcp.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(gcp.px - 16, gcp.py); ctx.lineTo(gcp.px + 16, gcp.py);
    ctx.moveTo(gcp.px, gcp.py - 16); ctx.lineTo(gcp.px, gcp.py + 16);
    ctx.stroke();
    // 원
    ctx.beginPath();
    ctx.arc(gcp.px, gcp.py, 10, 0, Math.PI*2);
    ctx.strokeStyle = gcp.color;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.fillStyle = gcp.color + '55';
    ctx.fill();
    // 번호
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i+1, gcp.px, gcp.py);
    // 이름 라벨
    ctx.fillStyle = gcp.color;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(gcp.name, gcp.px + 14, gcp.py - 10);
  });
}

// 드래그 스크롤
let isDragging = false, dragStartX, dragStartY, scrollStartX, scrollStartY;
const wrap = document.getElementById('canvas-wrap');

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  scrollStartX = wrap.scrollLeft; scrollStartY = wrap.scrollTop;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mouseup', e => {
  if (!isDragging) return;
  const dx = Math.abs(e.clientX - dragStartX);
  const dy = Math.abs(e.clientY - dragStartY);
  isDragging = false;
  canvas.style.cursor = 'crosshair';
  // 거의 안 움직였으면 클릭으로 처리 (canvas click 이벤트가 자연 발생)
  if (dx > 5 || dy > 5) e.stopImmediatePropagation();
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  wrap.scrollLeft = scrollStartX - (e.clientX - dragStartX);
  wrap.scrollTop  = scrollStartY - (e.clientY - dragStartY);
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const x = Math.round((e.clientX - rect.left) / scale);
  const y = Math.round((e.clientY - rect.top) / scale);
  document.getElementById('cursor-pos').textContent = `픽셀 좌표: x=${x}, y=${y}`;
});

canvas.addEventListener('click', e => {
  if (!img) return;
  const dx = Math.abs(e.clientX - dragStartX);
  const dy = Math.abs(e.clientY - dragStartY);
  if (dx > 5 || dy > 5) return; // 드래그였으면 무시
  const rect = canvas.getBoundingClientRect();
  const x = Math.round((e.clientX - rect.left) / scale);
  const y = Math.round((e.clientY - rect.top) / scale);

  GCPS[activeGCP].px = x;
  GCPS[activeGCP].py = y;

  // 다음 GCP로 자동 이동
  if (activeGCP < GCPS.length - 1) activeGCP++;

  redraw();
  renderCards();
  updateOutput();
});

function renderCards() {
  const list = document.getElementById('gcp-list');
  list.innerHTML = '';
  GCPS.forEach((gcp, i) => {
    const card = document.createElement('div');
    card.className = 'gcp-card' + (i === activeGCP ? ' active' : '') + (gcp.px !== null ? ' done' : '');
    card.onclick = () => { activeGCP = i; renderCards(); };

    const done = gcp.px !== null;
    card.innerHTML = `
      <div class="gcp-name">
        <div class="gcp-num" style="background:${gcp.color}33;color:${gcp.color};border:1.5px solid ${gcp.color};">${i+1}</div>
        ${gcp.name}
        ${done ? '<span style="margin-left:auto;font-size:10px;color:#10b981;">✓ 완료</span>' : ''}
      </div>
      <div class="gcp-pixel">픽셀: <span>${done ? `x=${gcp.px}, y=${gcp.py}` : '클릭 대기 중...'}</span></div>
      <div class="gcp-latlng">실좌표: <span>lat=${gcp.lat}, lng=${gcp.lng}</span></div>
    `;
    list.appendChild(card);
  });
}

function updateOutput() {
  const done = GCPS.filter(g => g.px !== null);
  if (done.length === 0) return;

  const lines = done.map(g =>
    `{ name:'${g.name}', px:${g.px}, py:${g.py}, lat:${g.lat}, lng:${g.lng} }`
  ).join(',\n');

  document.getElementById('output-box').textContent = `const GCPs = [\n${lines}\n];`;
}

function copyOutput() {
  const text = document.getElementById('output-box').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copy-btn').textContent = '✅ 복사됨!';
    setTimeout(() => document.getElementById('copy-btn').textContent = '📋 결과 복사', 2000);
  });
}

renderCards();
</script>
</body>
</html>
