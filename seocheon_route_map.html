<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서천 버스 노선 지도</title>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ea4bdbbdf5c627aba4db0a4b163c9b0d&libraries=clusterer"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Malgun Gothic',sans-serif;background:#f5f5f5;}

    #header{
      background:#1a3a5c;color:white;
      padding:11px 18px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1{font-size:16px;font-weight:bold;}
    #header .sub{font-size:12px;opacity:0.75;}

    #layout{display:flex;height:calc(100vh - 44px);}

    /* 사이드바 */
    #sidebar{
      width:260px;min-width:260px;background:white;
      overflow-y:auto;border-right:1px solid #e0e0e0;
      display:flex;flex-direction:column;
    }
    #sidebar-header{
      padding:10px 12px;background:#f8f9fa;
      border-bottom:1px solid #e0e0e0;
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    }
    #search-input{
      flex:1;min-width:0;padding:6px 10px;
      border:1px solid #ddd;border-radius:5px;font-size:12px;outline:none;
    }
    #search-input:focus{border-color:#1a3a5c;}
    .ctrl-btn{
      padding:5px 10px;border:none;border-radius:5px;
      cursor:pointer;font-size:11px;font-weight:bold;color:white;
    }
    #all-btn{background:#1a3a5c;}
    #none-btn{background:#888;}

    #route-list{flex:1;overflow-y:auto;padding:6px 0;}
    .group-header{
      padding:6px 12px;font-size:11px;font-weight:bold;
      background:#f0f0f0;color:#444;
      border-top:1px solid #ddd;border-bottom:1px solid #ddd;
      cursor:pointer;display:flex;align-items:center;gap:6px;
    }
    .group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .route-item{
      padding:5px 12px 5px 24px;font-size:11px;
      cursor:pointer;border-bottom:1px solid #f5f5f5;
      display:flex;align-items:center;gap:6px;
      transition:background 0.15s;
    }
    .route-item:hover{background:#e8f0fe;}
    .route-item.active{background:#d0e4ff;font-weight:bold;}
    .route-num{
      padding:2px 6px;border-radius:4px;
      color:white;font-size:10px;font-weight:bold;
      flex-shrink:0;
    }
    .route-dir{color:#555;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* 지도 */
    #map-area{flex:1;position:relative;}
    #map{width:100%;height:100%;}

    /* 노선 정보 패널 */
    #info-panel{
      position:absolute;bottom:16px;left:16px;
      background:white;border-radius:10px;
      box-shadow:0 4px 16px rgba(0,0,0,0.2);
      padding:14px 16px;min-width:240px;max-width:320px;
      display:none;z-index:50;font-size:12px;
    }
    #info-panel .info-title{
      font-size:14px;font-weight:bold;margin-bottom:8px;
      display:flex;align-items:center;gap:8px;
    }
    #info-panel .info-badge{
      padding:2px 8px;border-radius:12px;color:white;font-size:11px;
    }
    #info-panel .info-row{
      display:flex;gap:6px;margin-bottom:4px;color:#555;
    }
    #info-panel .info-label{color:#999;width:52px;flex-shrink:0;}
    #info-stops{
      max-height:160px;overflow-y:auto;margin-top:8px;
      border-top:1px solid #eee;padding-top:8px;
    }
    .stop-tag{
      display:inline-block;padding:2px 7px;margin:2px;
      border-radius:10px;background:#f0f4ff;
      color:#333;font-size:10px;border:1px solid #dde;
    }
    #close-info{
      position:absolute;top:8px;right:10px;
      cursor:pointer;font-size:16px;color:#aaa;
    }
    #close-info:hover{color:#333;}

    /* 전체보기 버튼 */
    #reset-btn{
      position:absolute;top:12px;right:12px;
      background:white;border:1px solid #ddd;border-radius:6px;
      padding:7px 12px;font-size:12px;cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);z-index:50;
    }
    #reset-btn:hover{background:#f0f0f0;}
  </style>
</head>
<body>
<div id="header">
  <h1>🚌 서천 버스 노선 지도</h1>
  <span class="sub">총 131개 노선 · 24개 노선군</span>
</div>
<div id="layout">
  <!-- 사이드바 -->
  <div id="sidebar">
    <div id="sidebar-header">
      <input type="text" id="search-input" placeholder="노선·정류장 검색...">
      <button class="ctrl-btn" id="all-btn" onclick="showAll()">전체</button>
      <button class="ctrl-btn" id="none-btn" onclick="hideAll()">숨김</button>
    </div>
    <div id="route-list"></div>
  </div>
  <!-- 지도 -->
  <div id="map-area">
    <div id="map"></div>
    <button id="reset-btn" onclick="resetView()">🔍 전체보기</button>
    <div id="info-panel">
      <span id="close-info" onclick="closeInfo()">✕</span>
      <div class="info-title">
        <span id="info-num"></span>
        <span id="info-badge" class="info-badge"></span>
      </div>
      <div class="info-row"><span class="info-label">기점→종점</span><span id="info-route"></span></div>
      <div class="info-row"><span class="info-label">유형</span><span id="info-type"></span></div>
      <div class="info-row"><span class="info-label">평일 횟수</span><span id="info-weekday"></span></div>
      <div class="info-row"><span class="info-label">정류장 수</span><span id="info-stopcount"></span></div>
      <div id="info-stops"></div>
    </div>
  </div>
</div>

  const markers = route.stops.map(stop => {
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(stop.lat, stop.lng),
      title: stop.name
    });
    kakao.maps.event.addListener(marker, 'click', () => selectRoute(idx));
    return marker;
  });
  markerSets[idx] = markers;
});

// ── 사이드바 렌더링 ───────────────────────────────────────
const listEl = document.getElementById('route-list');

GROUPS.forEach(group => {
  const groupRoutes = ROUTES.map((r,i) => ({...r, idx:i})).filter(r => r.group === group.name);

  const gh = document.createElement('div');
  gh.className = 'group-header';
  gh.innerHTML = `<span class="group-dot" style="background:${group.color}"></span>${group.name} (${groupRoutes.length})`;
  gh.onclick = () => toggleGroup(group.name);
  listEl.appendChild(gh);

  groupRoutes.forEach(route => {
    const item = document.createElement('div');
    item.className = 'route-item';
    item.id = 'ri-' + route.idx;
    item.innerHTML =
      `<span class="route-num" style="background:${route.color}">${route.number}</span>` +
      `<span class="route-dir">${route.from} → ${route.to}</span>`;
    item.onclick = () => selectRoute(route.idx);
    listEl.appendChild(item);
  });
});

// ── 노선 선택 ─────────────────────────────────────────────
function selectRoute(idx) {
  // 이전 강조 해제
  if (activeIdx !== null) {
    polylines[activeIdx].setOptions({strokeWeight:3, strokeOpacity:0.75});
    markerSets[activeIdx].forEach(m => m.setMap(null));
    document.getElementById('ri-'+activeIdx)?.classList.remove('active');
  }

  activeIdx = idx;
  const route = ROUTES[idx];

  // 강조
  polylines[idx].setOptions({strokeWeight:6, strokeOpacity:1});
  markerSets[idx].forEach(m => m.setMap(map));
  document.getElementById('ri-'+idx)?.classList.add('active');
  document.getElementById('ri-'+idx)?.scrollIntoView({block:'nearest'});

  // 지도 범위 이동
  const bounds = new kakao.maps.LatLngBounds();
  route.path.forEach(p => bounds.extend(new kakao.maps.LatLng(p[0],p[1])));
  map.setBounds(bounds);

  // 정보 패널
  document.getElementById('info-num').textContent = route.number + '번';
  document.getElementById('info-badge').textContent = route.group;
  document.getElementById('info-badge').style.background = route.color;
  document.getElementById('info-route').textContent = route.from + ' → ' + route.to;
  document.getElementById('info-type').textContent = route.type;
  document.getElementById('info-weekday').textContent = route.weekday + '회';
  document.getElementById('info-stopcount').textContent = route.stops.length + '개';
  document.getElementById('info-stops').innerHTML =
    route.stops.map(s => `<span class="stop-tag">🚏 ${s.name}</span>`).join('');
  document.getElementById('info-panel').style.display = 'block';
}

function closeInfo() {
  document.getElementById('info-panel').style.display = 'none';
  if (activeIdx !== null) {
    polylines[activeIdx].setOptions({strokeWeight:3, strokeOpacity:0.75});
    markerSets[activeIdx].forEach(m => m.setMap(null));
    document.getElementById('ri-'+activeIdx)?.classList.remove('active');
    activeIdx = null;
  }
}

// ── 그룹 토글 ─────────────────────────────────────────────
function toggleGroup(groupName) {
  const groupRoutes = ROUTES.map((r,i)=>({...r,idx:i})).filter(r=>r.group===groupName);
  const firstPoly = polylines[groupRoutes[0]?.idx];
  if (!firstPoly) return;
  const visible = firstPoly.getMap() !== null;
  groupRoutes.forEach(r => {
    polylines[r.idx].setMap(visible ? null : map);
  });
}

function showAll() {
  ROUTES.forEach((_,i) => polylines[i].setMap(map));
}
function hideAll() {
  ROUTES.forEach((_,i) => {
    polylines[i].setMap(null);
    markerSets[i].forEach(m => m.setMap(null));
  });
  closeInfo();
}

// ── 검색 ──────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim();
  document.querySelectorAll('.route-item').forEach(el => {
    el.style.display = (!q || el.textContent.includes(q)) ? '' : 'none';
  });
});

function resetView() {
  closeInfo();
  showAll();
  map.setCenter(new kakao.maps.LatLng(36.0965, 126.7126));
  map.setLevel(10);
}
</script>
</body>
