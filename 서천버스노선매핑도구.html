<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>서천 버스 노선 매핑 도구</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;display:flex;height:100vh;overflow:hidden;background:#1a1a2e;color:#eee}
#sidebar{width:360px;min-width:300px;display:flex;flex-direction:column;background:#16213e;border-right:2px solid #0f3460;overflow:hidden;z-index:10}
#map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* 헤더 */
#hdr{padding:10px 14px;background:linear-gradient(135deg,#0f3460,#1a4a7a);border-bottom:1px solid #1e5090}
#hdr h2{font-size:14px;color:#f5a623;margin-bottom:3px}
#hdr .sub{font-size:10px;color:#aaa}

/* 진행률 */
#prog{padding:8px 12px;background:#0a1628;border-bottom:1px solid #0f3460;font-size:11px}
.prog-bar{height:5px;background:#1a2a3a;border-radius:3px;margin:4px 0;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#e94560,#f5a623);border-radius:3px;transition:width .3s}
.prog-stats{display:flex;gap:10px;font-size:10px;color:#888}

/* 탭 */
#tabs{display:flex;border-bottom:1px solid #0f3460}
.tab{flex:1;padding:7px;text-align:center;font-size:11px;cursor:pointer;color:#888;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#f5a623;border-color:#f5a623;background:#0f2040}

/* 패널 */
.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.active{display:flex}

/* 노선 목록 */
#route-scroll{flex:1;overflow-y:auto;padding:6px}
#route-scroll::-webkit-scrollbar{width:4px}
#route-scroll::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.rgroup-hdr{font-size:10px;color:#f5a623;padding:4px 6px;background:#0a1e38;border-radius:3px;margin:4px 0 2px;cursor:pointer}
.ritem{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;cursor:pointer;border:1px solid #1a2a3a;margin-bottom:2px;transition:.15s}
.ritem:hover{background:#1e3a5f;border-color:#2a5a8f}
.ritem.sel{background:#0f3060;border-color:#e94560}
.rnum{min-width:34px;font-size:11px;font-weight:bold;color:#e94560;text-align:center;background:#0a1020;padding:2px 3px;border-radius:3px}
.rinfo{flex:1;min-width:0}
.rname{font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rsub{font-size:10px;color:#666}
.rbadge{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:bold}
.badge-done{background:#1a4a2a;color:#4ade80}
.badge-part{background:#3a2a00;color:#fbbf24}
.badge-none{background:#1a1a2a;color:#555}

/* 노선 상세 */
#detail{flex:1;overflow-y:auto;padding:10px}
#detail::-webkit-scrollbar{width:4px}
#detail::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.d-title{font-size:14px;font-weight:bold;color:#f5a623;margin-bottom:6px}
.d-meta{font-size:11px;color:#888;margin-bottom:10px;line-height:1.8}
.d-meta span{color:#bbb}

.sec-title{font-size:11px;font-weight:bold;color:#9ec5fe;margin:10px 0 5px;padding-bottom:3px;border-bottom:1px solid #1e3050}

/* 경유지 */
.wp-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;margin-bottom:3px;border:1px solid #1e2a3a;background:#0a1020;font-size:11px;transition:.15s;cursor:pointer}
.wp-item:hover{border-color:#4a9eff}
.wp-item.wp-ok{border-color:#27ae60;background:#0a1a0a}
.wp-item.wp-fail{border-color:#e94560;background:#1a0a0a}
.wp-item.wp-search{border-color:#f5a623;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.wp-dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0}
.wp-ok .wp-dot{background:#27ae60}
.wp-fail .wp-dot{background:#e94560}
.wp-search .wp-dot{background:#f5a623}
.wp-label{flex:1;color:#ccc}
.wp-coord{font-size:9px;color:#555}
.wp-edit{font-size:10px;color:#4a9eff;cursor:pointer}
.wp-edit:hover{text-decoration:underline}

/* 확정 정거장 */
.stop-chip{display:inline-flex;align-items:center;gap:3px;background:#0f2040;border:1px solid #1e4060;border-radius:10px;padding:2px 8px;font-size:10px;color:#9ec5fe;margin:2px;cursor:pointer}
.stop-chip:hover{border-color:#4a9eff}
.chip-x{color:#e94560;margin-left:2px;cursor:pointer;font-weight:bold}

/* 버튼 */
.btn-row{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
.btn{padding:5px 9px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold;transition:.15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-r{background:#e94560;color:#fff} .btn-r:hover{background:#c0392b}
.btn-g{background:#27ae60;color:#fff} .btn-g:hover{background:#1e8449}
.btn-b{background:#2980b9;color:#fff} .btn-b:hover{background:#1a6a9a}
.btn-y{background:#f5a623;color:#111} .btn-y:hover{background:#d4891a}
.btn-d{background:#2a2a3a;color:#ccc} .btn-d:hover{background:#3a3a4a}

/* 지도 오버레이 */
#map-status{position:absolute;top:10px;left:10px;z-index:100;background:rgba(15,52,96,.9);padding:6px 12px;border-radius:6px;font-size:11px;color:#ddd;display:none}
#map-status.show{display:block}
#click-banner{display:none;position:absolute;top:0;left:0;right:0;z-index:200;background:rgba(233,69,96,.92);color:#fff;text-align:center;padding:9px;font-size:12px;font-weight:bold}
#click-banner.show{display:block}
#map-btns{position:absolute;top:10px;right:10px;z-index:100;display:flex;flex-direction:column;gap:4px}
.mbtn{padding:5px 10px;background:rgba(22,33,62,.95);border:1px solid #0f3460;color:#ddd;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap}
.mbtn:hover{background:rgba(15,52,96,.95)}

/* 팝업 */
#popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center}
#popup.show{display:flex}
#pbox{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:18px;width:420px;max-height:80vh;overflow-y:auto}
#pbox h3{color:#f5a623;font-size:13px;margin-bottom:10px}
#psearch{width:100%;padding:7px;background:#0a1628;border:1px solid #1e3050;color:#eee;border-radius:4px;font-size:12px;margin-bottom:6px}
.pres{padding:8px;border:1px solid #1e3050;border-radius:4px;margin-bottom:5px;cursor:pointer;transition:.15s}
.pres:hover{background:#1e3a5f;border-color:#4a9eff}
.pres-name{font-size:12px;color:#ddd;font-weight:bold}
.pres-addr{font-size:10px;color:#888}
.pres-coord{font-size:10px;color:#4a9eff}

/* 저장 알림 */
#saved-toast{display:none;position:absolute;bottom:15px;left:50%;transform:translateX(-50%);background:rgba(39,174,96,.95);color:#fff;padding:6px 14px;border-radius:20px;font-size:11px;z-index:300}
</style>
</head>
<body>

<div id="sidebar">
  <div id="hdr">
    <h2>🚌 서천 버스 노선 매핑 도구 v2</h2>
    <div class="sub">벡터 방향성 기반 · 133개 노선 · 1,084개 정거장</div>
  </div>

  <div id="prog">
    <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
    <div class="prog-stats">
      <span id="p-done" style="color:#4ade80">● 완료 0</span>
      <span id="p-part" style="color:#fbbf24">● 진행중 0</span>
      <span id="p-none" style="color:#555">● 미작업 133</span>
    </div>
  </div>

  <div id="tabs">
    <div class="tab active" onclick="showTab('list')">📋 노선목록</div>
    <div class="tab" onclick="showTab('detail')" id="tab-detail">🗺 작업창</div>
    <div class="tab" onclick="showTab('export')">💾 저장/내보내기</div>
  </div>

  <!-- 노선 목록 탭 -->
  <div id="tab-list" class="panel active">
    <div style="padding:6px;border-bottom:1px solid #0f3460;display:flex;gap:4px">
      <input id="search-route" placeholder="노선 검색..." style="flex:1;padding:5px;background:#0a1628;border:1px solid #1e3050;color:#eee;border-radius:4px;font-size:11px" oninput="filterRoutes(this.value)">
      <select id="filter-type" style="padding:5px;background:#0a1628;border:1px solid #1e3050;color:#eee;border-radius:4px;font-size:11px" onchange="filterRoutes()">
        <option value="">전체</option>
        <option value="편도">편도</option>
        <option value="왕복">왕복</option>
        <option value="순환">순환</option>
      </select>
    </div>
    <div id="route-scroll"></div>
  </div>

  <!-- 작업 탭 -->
  <div id="tab-detail" class="panel" style="display:none">
    <div id="detail">
      <div style="color:#555;text-align:center;margin-top:40px;font-size:13px">← 노선 목록에서 노선을 선택하세요</div>
    </div>
  </div>

  <!-- 저장 탭 -->
  <div id="tab-export" class="panel" style="display:none;padding:12px;gap:8px">
    <div class="sec-title">💾 데이터 저장/불러오기</div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="saveAll()">브라우저 저장</button>
      <button class="btn btn-b" onclick="loadSaved()">불러오기</button>
    </div>
    <div class="sec-title">📤 결과 내보내기</div>
    <div class="btn-row">
      <button class="btn btn-y" onclick="exportJSON()">JSON 내보내기</button>
      <button class="btn btn-r" onclick="exportCSV()">CSV 내보내기</button>
    </div>
    <div class="sec-title">📊 작업 현황</div>
    <div id="export-stats" style="font-size:11px;color:#aaa;line-height:1.8"></div>
    <div class="sec-title">⚡ 전체 자동처리</div>
    <div class="btn-row">
      <button class="btn btn-r" onclick="autoAll()">전체 자동 매핑 시작</button>
    </div>
    <div id="auto-log" style="font-size:10px;color:#888;margin-top:8px;max-height:200px;overflow-y:auto"></div>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="click-banner">🎯 지도를 클릭하여 위치 선택 | ESC 취소</div>
  <div id="map-status"></div>
  <div id="map-btns">
    <div class="mbtn" onclick="toggleStops()">정거장 표시/숨김</div>
    <div class="mbtn" onclick="fitRoute()">노선 맞춤보기</div>
    <div class="mbtn" onclick="resetView()">전체 보기</div>
  </div>
  <div id="saved-toast">✓ 저장됨</div>
</div>

<!-- 검색 팝업 -->
<div id="popup">
  <div id="pbox">
    <h3 id="ptitle">경유지 위치 검색</h3>
    <input id="psearch" placeholder="검색어 입력 후 Enter..." onkeydown="if(event.key==='Enter')doPopupSearch()">
    <div style="display:flex;gap:5px;margin-bottom:10px">
      <button class="btn btn-r" style="flex:1" onclick="doPopupSearch()">🔍 검색</button>
      <button class="btn btn-y" onclick="enterClickMode()">📍 지도클릭</button>
      <button class="btn btn-d" onclick="closePopup()">닫기</button>
    </div>
    <div id="presults"></div>
  </div>
</div>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 벡터 방향성 핵심 로직
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// 두 점 사이 거리 (미터)
function dist(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// A→B 방향 각도 (도)
function bearing(lat1,lng1,lat2,lng2) {
  const dLng=(lng2-lng1)*Math.PI/180;
  const y=Math.sin(dLng)*Math.cos(lat2*Math.PI/180);
  const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// 각도 차이 (최소값, 0~180)
function angleDiff(a,b) {
  let d=Math.abs(a-b)%360;
  return d>180?360-d:d;
}

// 경유지 A→B 구간에서 stops 중 후보 찾기 (벡터 방향성 필터)
// 반환: stops 배열을 점수순으로 정렬한 결과
function findCandidateStops(wpName, prevCoord, nextCoord, routeStartCoord, routeEndCoord) {
  // 전체 노선 방향 벡터
  const globalBearing = bearing(routeStartCoord.lat, routeStartCoord.lng, routeEndCoord.lat, routeEndCoord.lng);
  
  // 구간 방향 벡터 (이전경유지→다음경유지)
  let segBearing = null;
  if (prevCoord && nextCoord) {
    segBearing = bearing(prevCoord.lat, prevCoord.lng, nextCoord.lat, nextCoord.lng);
  }
  
  // 이름 유사도 점수 (0~100)
  function nameSimilarity(stopName) {
    const a = wpName.replace(/[()·.，,\s]/g,'');
    const b = stopName.replace(/[()·.，,\s]/g,'');
    if (a===b) return 100;
    if (b.includes(a)||a.includes(b)) return 70;
    // 공통 문자 비율
    let common=0;
    for(const c of a) if(b.includes(c)) common++;
    return Math.round(common/Math.max(a.length,b.length)*50);
  }

  const results = STOPS.map(s => {
    let score = 0;
    
    // 1. 이름 유사도 (최대 100점)
    score += nameSimilarity(s.name);
    
    // 2. 구간 중심점 근접도 점수
    if (prevCoord && nextCoord) {
      const midLat = (prevCoord.lat + nextCoord.lat) / 2;
      const midLng = (prevCoord.lng + nextCoord.lng) / 2;
      const d = dist(s.lat, s.lng, midLat, midLng);
      // 500m 이내 만점, 멀수록 감점
      score += Math.max(0, 50 - d/100);
    }
    
    // 3. 전체 노선 방향 일치도 (정거장이 올바른 방향에 있는지)
    // 기점→정거장 방향이 전체 노선 방향과 비슷해야 함
    if (prevCoord) {
      const toBearing = bearing(prevCoord.lat, prevCoord.lng, s.lat, s.lng);
      const diff = angleDiff(toBearing, globalBearing);
      // 방향이 맞으면 보너스, 역방향이면 페널티
      score += Math.max(0, 30 - diff/3);
    }
    
    // 4. 구간 방향 일치도 (이전경유지→정거장→다음경유지가 자연스러워야)
    if (segBearing !== null && prevCoord) {
      const toStop = bearing(prevCoord.lat, prevCoord.lng, s.lat, s.lng);
      const diff = angleDiff(toStop, segBearing);
      score += Math.max(0, 20 - diff/3);
    }
    
    return { stop: s, score: Math.round(score), d: prevCoord ? dist(s.lat,s.lng,prevCoord.lat,prevCoord.lng) : 9999 };
  });
  
  // 이름 유사도 최소 10점 이상만, 점수 내림차순
  return results
    .filter(r => r.score >= 10)
    .sort((a,b) => b.score - a.score)
    .slice(0, 10);
}

// 카카오 장소 검색
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function kakaoSearch(keyword, callback) {
  const ps = new kakao.maps.services.Places();
  // 서천군 중심 근처로 제한
  ps.keywordSearch(keyword + ' 서천', function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      callback(data);
    } else {
      // 서천 없이 재시도
      ps.keywordSearch(keyword, function(data2, status2) {
        callback(status2 === kakao.maps.services.Status.OK ? data2 : []);
      });
    }
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 노선 자동 매핑
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function autoMapRoute(route) {
  const rId = route.id;
  if (!workData[rId]) workData[rId] = { waypoints: [], confirmedStops: [] };
  
  const wps = route.waypoints_forward || [];
  const result = [];
  
  // 기종점 먼저 stops에서 찾기
  function findInStops(name) {
    const exact = STOPS.find(s => s.name === name);
    if (exact) return exact;
    const partial = STOPS.find(s => s.name.includes(name) || name.includes(s.name));
    return partial || null;
  }
  
  const startStop = findInStops(route.start);
  const endStop = findInStops(route.end);
  const routeStartCoord = startStop ? {lat:startStop.lat, lng:startStop.lng} : null;
  const routeEndCoord = endStop ? {lat:endStop.lat, lng:endStop.lng} : null;
  
  for (let i = 0; i < wps.length; i++) {
    const name = wps[i];
    const prevWp = result[i-1];
    const prevCoord = prevWp?.lat ? {lat:prevWp.lat, lng:prevWp.lng} : routeStartCoord;
    
    // 이미 확정된 경우 스킵
    const existing = workData[rId].waypoints.find(w => w.name === name && w.status === 'ok');
    if (existing) { result.push(existing); continue; }
    
    // stops에서 직접 매칭
    const direct = findInStops(name);
    if (direct) {
      result.push({name, lat:direct.lat, lng:direct.lng, status:'ok', stopId:direct.id});
      continue;
    }
    
    // 벡터 방향성으로 후보 찾기
    const nextWpName = wps[i+1];
    let nextCoord = null;
    if (nextWpName) {
      const ns = findInStops(nextWpName);
      if (ns) nextCoord = {lat:ns.lat, lng:ns.lng};
    }
    
    const candidates = findCandidateStops(name, prevCoord, nextCoord, routeStartCoord || {lat:36.09,lng:126.69}, routeEndCoord || {lat:36.09,lng:126.69});
    
    if (candidates.length > 0 && candidates[0].score >= 40) {
      const best = candidates[0].stop;
      result.push({name, lat:best.lat, lng:best.lng, status:'ok', stopId:best.id, score:candidates[0].score, auto:true});
    } else {
      result.push({name, lat:null, lng:null, status:'fail', candidates: candidates.slice(0,5)});
    }
  }
  
  workData[rId].waypoints = result;
  
  // 경유지 좌표로 노선 위 stops 스냅
  if (routeStartCoord && routeEndCoord) {
    snapStopsToRoute(rId, result, route);
  }
  
  return result;
}

// 노선 경로 위의 정거장 스냅
function snapStopsToRoute(rId, waypoints, route) {
  const coordWps = waypoints.filter(w => w.lat && w.lng);
  if (coordWps.length < 2) return;
  
  const confirmedStops = [];
  
  // 각 구간(경유지→다음경유지)에 대해
  for (let i = 0; i < coordWps.length - 1; i++) {
    const A = coordWps[i];
    const B = coordWps[i+1];
    const segBear = bearing(A.lat, A.lng, B.lat, B.lng);
    const segLen = dist(A.lat, A.lng, B.lat, B.lng);
    
    // 이 구간 내 stops 찾기
    STOPS.forEach(s => {
      // 구간 양 끝점과의 거리가 구간 길이 이하
      const dA = dist(s.lat, s.lng, A.lat, A.lng);
      const dB = dist(s.lat, s.lng, B.lat, B.lng);
      
      if (dA > segLen + 500 || dB > segLen + 500) return;
      
      // A에서 정거장 방향이 구간 방향과 일치 (±60도)
      const toStop = bearing(A.lat, A.lng, s.lat, s.lng);
      if (angleDiff(toStop, segBear) > 60) return;
      
      // 구간 선분과의 수직거리 (200m 이하)
      const perpDist = calcPerpendicularDist(A.lat, A.lng, B.lat, B.lng, s.lat, s.lng);
      if (perpDist > 200) return;
      
      if (!confirmedStops.find(cs => cs.id === s.id)) {
        confirmedStops.push({id:s.id, name:s.name, lat:s.lat, lng:s.lng, segIdx:i, distFromA:dA});
      }
    });
  }
  
  // 구간별 거리순 정렬
  confirmedStops.sort((a,b) => a.segIdx - b.segIdx || a.distFromA - b.distFromA);
  workData[rId].confirmedStops = confirmedStops.map(s=>s.id);
  workData[rId].confirmedStopsDetail = confirmedStops;
}

// 선분 수직거리
function calcPerpendicularDist(lat1,lng1,lat2,lng2,latP,lngP) {
  const dx=lng2-lng1, dy=lat2-lat1;
  const len2=dx*dx+dy*dy;
  if(len2===0) return dist(latP,lngP,lat1,lng1);
  const t=Math.max(0,Math.min(1,((lngP-lng1)*dx+(latP-lat1)*dy)/len2));
  return dist(latP,lngP, lat1+t*dy, lng1+t*dx);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 지도 노선 표시
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ROUTE_COLORS = ['#e94560','#f5a623','#27ae60','#2980b9','#9b59b6','#1abc9c','#e67e22','#3498db'];

function drawRouteOnMap(route) {
  clearRouteOverlays();
  if (!map) return;
  
  const rId = route.id;
  const wd = workData[rId];
  if (!wd || !wd.waypoints) return;
  
  const coords = wd.waypoints.filter(w => w.lat && w.lng).map(w => new kakao.maps.LatLng(w.lat, w.lng));
  if (coords.length < 2) return;
  
  const color = ROUTE_COLORS[parseInt(route.id) % ROUTE_COLORS.length] || '#e94560';
  
  // 카카오 경로 API 사용 (간단히 polyline으로 연결)
  const polyline = new kakao.maps.Polyline({
    path: coords,
    strokeWeight: 4,
    strokeColor: color,
    strokeOpacity: 0.85,
    strokeStyle: 'solid'
  });
  polyline.setMap(map);
  routeOverlays.push(polyline);
  
  // 경유지 마커
  wd.waypoints.forEach((w, i) => {
    if (!w.lat || !w.lng) return;
    const isEndpoint = i===0 || i===wd.waypoints.length-1;
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(w.lat, w.lng),
      map: map,
      title: w.name,
      zIndex: isEndpoint ? 10 : 5
    });
    routeOverlays.push(marker);
  });
  
  // 확정 정거장 표시
  if (wd.confirmedStopsDetail) {
    wd.confirmedStopsDetail.forEach(s => {
      const circle = new kakao.maps.Circle({
        center: new kakao.maps.LatLng(s.lat, s.lng),
        radius: 30,
        strokeWeight: 2,
        strokeColor: color,
        strokeOpacity: 0.8,
        fillColor: color,
        fillOpacity: 0.4,
        map: map
      });
      routeOverlays.push(circle);
    });
  }
  
  // 지도 맞춤
  const bounds = new kakao.maps.LatLngBounds();
  coords.forEach(c => bounds.extend(c));
  map.setBounds(bounds, 50);
}

function clearRouteOverlays() {
  routeOverlays.forEach(o => { try{o.setMap(null)}catch(e){} });
  routeOverlays = [];
}

function fitRoute() {
  if (routeOverlays.length === 0) return;
  const rId = currentRouteId;
  if (!rId || !workData[rId]) return;
  const coords = (workData[rId].waypoints||[]).filter(w=>w.lat&&w.lng).map(w=>new kakao.maps.LatLng(w.lat,w.lng));
  if (!coords.length) return;
  const bounds = new kakao.maps.LatLngBounds();
  coords.forEach(c=>bounds.extend(c));
  map.setBounds(bounds,50);
}

function resetView() { map && map.setCenter(new kakao.maps.LatLng(36.0949,126.6900)); map && map.setLevel(9); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI - 노선 목록
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderRouteList(filter='', typeFilter='') {
  const container = document.getElementById('route-scroll');
  
  // 그룹화
  const groups = {};
  ROUTES.forEach(r => {
    if (filter && !r.id.includes(filter) && !r.start.includes(filter) && !r.end.includes(filter)) return;
    if (typeFilter && r.type !== typeFilter) return;
    if (!groups[r.group]) groups[r.group] = [];
    groups[r.group].push(r);
  });
  
  let html = '';
  Object.entries(groups).forEach(([grp, routes]) => {
    html += `<div class="rgroup-hdr" onclick="toggleGroup(this)">▼ ${grp} (${routes.length}개)</div>`;
    html += '<div class="rgroup-items">';
    routes.forEach(r => {
      const wd = workData[r.id];
      const wps = wd?.waypoints || [];
      const okCount = wps.filter(w=>w.status==='ok').length;
      const totalCount = wps.length;
      const stops = wd?.confirmedStops?.length || 0;
      
      let badge, cls;
      if (totalCount > 0 && okCount === totalCount && stops > 0) {
        badge = `<span class="rbadge badge-done">완료 ${stops}정</span>`;
        cls = 'ritem';
      } else if (okCount > 0 || stops > 0) {
        badge = `<span class="rbadge badge-part">${okCount}/${totalCount}</span>`;
        cls = 'ritem';
      } else {
        badge = `<span class="rbadge badge-none">미작업</span>`;
        cls = 'ritem';
      }
      
      const typeColor = r.type==='편도'?'#4a9eff':r.type==='왕복'?'#f5a623':'#9b59b6';
      html += `<div class="${cls}" id="ritem-${r.id}" onclick="selectRoute('${r.id}')">
        <div class="rnum">${r.id}</div>
        <div class="rinfo">
          <div class="rname">${r.start} → ${r.end}</div>
          <div class="rsub"><span style="color:${typeColor}">${r.type}</span> · ${r.weekday}회/일 · ${r.distance}km</div>
        </div>
        ${badge}
      </div>`;
    });
    html += '</div>';
  });
  
  container.innerHTML = html || '<div style="color:#555;padding:20px;text-align:center">결과 없음</div>';
}

function toggleGroup(el) {
  const items = el.nextElementSibling;
  const collapsed = items.style.display === 'none';
  items.style.display = collapsed ? '' : 'none';
  el.textContent = (collapsed?'▼':'▶') + el.textContent.slice(1);
}

function filterRoutes() {
  const f = document.getElementById('search-route').value;
  const t = document.getElementById('filter-type').value;
  renderRouteList(f, t);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI - 노선 선택 & 상세
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function selectRoute(rId) {
  currentRouteId = rId;
  
  // 이전 선택 해제
  document.querySelectorAll('.ritem.sel').forEach(el=>el.classList.remove('sel'));
  const el = document.getElementById('ritem-'+rId);
  if (el) el.classList.add('sel');
  
  showTab('detail');
  
  const route = ROUTES.find(r => r.id === rId);
  if (!route) return;
  
  renderDetailPanel(route);
  
  // 지도가 없으면 초기화
  if (!map) initMap();
  
  // 작업데이터 없으면 자동 매핑
  if (!workData[rId] || !workData[rId].waypoints?.length) {
    setStatus('자동 매핑 중...');
    await autoMapRoute(route);
  }
  
  renderDetailPanel(route); // 업데이트
  drawRouteOnMap(route);
  setStatus('');
}

function renderDetailPanel(route) {
  const rId = route.id;
  const wd = workData[rId] || {waypoints:[], confirmedStops:[]};
  const wps = wd.waypoints || [];
  
  const typeColor = route.type==='편도'?'#4a9eff':route.type==='왕복'?'#f5a623':'#9b59b6';
  
  let wpHtml = '';
  const allWps = route.waypoints_forward || [];
  allWps.forEach((name, i) => {
    const w = wps.find(wp=>wp.name===name) || {name, status:'fail'};
    let cls = w.status==='ok'?'wp-ok':w.status==='fail'?'wp-fail':'wp-search';
    let coord = w.lat ? `${w.lat.toFixed(4)},${w.lng.toFixed(4)}` : '미확정';
    let auto = w.auto ? '🤖' : w.status==='ok'?'✓':'';
    
    wpHtml += `<li class="wp-item ${cls}" onclick="focusWaypoint('${rId}',${i})">
      <div class="wp-dot"></div>
      <div class="wp-label">${i===0?'🔵':i===allWps.length-1?'🔴':'⚪'} ${name}</div>
      <div class="wp-coord">${auto} ${coord}</div>
      <div class="wp-edit" onclick="event.stopPropagation();openPopup('${rId}',${i})">수정</div>
    </li>`;
  });
  
  // 확정 정거장
  const stopsDetail = wd.confirmedStopsDetail || [];
  let stopsHtml = stopsDetail.map((s,i) => 
    `<span class="stop-chip" onclick="focusStop(${s.lat},${s.lng})" title="${s.name}">
      ${i+1}. ${s.name}
      <span class="chip-x" onclick="event.stopPropagation();removeStop('${rId}','${s.id}')">×</span>
    </span>`
  ).join('');
  
  const okCount = wps.filter(w=>w.status==='ok').length;
  
  document.getElementById('detail').innerHTML = `
    <div class="d-title">🚌 ${route.id}번 노선</div>
    <div class="d-meta">
      <span style="color:${typeColor}">${route.type}</span> · ${route.group}<br>
      ${route.start} <span>→</span> ${route.end}<br>
      평일 ${route.weekday}회 · 첫차 ${route.first_bus} · 막차 ${route.last_bus} · ${route.distance}km
      ${route.waypoints_backward ? '<br><span style="color:#888">왕복노선 (역방향 포함)</span>' : ''}
    </div>
    
    <div class="btn-row">
      <button class="btn btn-r" onclick="reAutoMap('${rId}')">🔄 재매핑</button>
      <button class="btn btn-b" onclick="drawRouteKakao('${rId}')">🗺 카카오경로</button>
      <button class="btn btn-g" onclick="saveAll()">💾 저장</button>
    </div>
    
    <div class="sec-title">📍 경유지 (${okCount}/${allWps.length} 확정)</div>
    <ul class="wp-list">${wpHtml}</ul>
    
    <div class="sec-title">🚏 확정 정거장 (${stopsDetail.length}개)</div>
    <div id="stops-area">${stopsHtml || '<span style="color:#555;font-size:11px">경유지 확정 후 자동 스냅됩니다</span>'}</div>
    
    ${route.waypoints_backward ? `
    <div class="sec-title">↩ 역방향 경유지</div>
    <div style="font-size:10px;color:#666;line-height:1.8">${route.waypoints_backward.join(' → ')}</div>
    ` : ''}
  `;
}

async function reAutoMap(rId) {
  const route = ROUTES.find(r=>r.id===rId);
  if (!route) return;
  setStatus('재매핑 중...');
  workData[rId] = {waypoints:[], confirmedStops:[]};
  await autoMapRoute(route);
  renderDetailPanel(route);
  drawRouteOnMap(route);
  setStatus('');
  updateProgress();
}

// 카카오 길찾기 API로 실제 도로 경로
function drawRouteKakao(rId) {
  const wd = workData[rId];
  if (!wd || !wd.waypoints) return;
  const coords = wd.waypoints.filter(w=>w.lat&&w.lng);
  if (coords.length < 2) { alert('경유지 좌표가 부족합니다'); return; }
  
  clearRouteOverlays();
  
  // 카카오 Directions API (차량 경로)
  const origin = `${coords[0].lng},${coords[0].lat}`;
  const destination = `${coords[coords.length-1].lng},${coords[coords.length-1].lat}`;
  const waypoints = coords.slice(1,-1).slice(0,5).map(w=>`${w.lng},${w.lat}`).join('|');
  
  const url = `https://apis-navi.kakaomobility.com/v1/directions?origin=${origin}&destination=${destination}${waypoints?'&waypoints='+waypoints:''}&priority=RECOMMEND`;
  
  fetch(url, {
    headers: {'Authorization': 'KakaoAK ' + KAKAO_KEY}
  })
  .then(r => r.json())
  .then(data => {
    if (data.routes && data.routes[0]) {
      const sections = data.routes[0].sections;
      const route = ROUTES.find(r=>r.id===rId);
      const color = ROUTE_COLORS[parseInt(rId) % ROUTE_COLORS.length] || '#e94560';
      
      sections.forEach(sec => {
        sec.roads.forEach(road => {
          const pts = [];
          for(let i=0;i<road.vertexes.length;i+=2) {
            pts.push(new kakao.maps.LatLng(road.vertexes[i+1], road.vertexes[i]));
          }
          const poly = new kakao.maps.Polyline({
            path: pts, strokeWeight:5, strokeColor:color,
            strokeOpacity:0.9, strokeStyle:'solid', map
          });
          routeOverlays.push(poly);
        });
      });
      
      const allPts = sections.flatMap(s=>s.roads.flatMap(r=>{
        const pts=[];
        for(let i=0;i<r.vertexes.length;i+=2) pts.push(new kakao.maps.LatLng(r.vertexes[i+1],r.vertexes[i]));
        return pts;
      }));
      const bounds = new kakao.maps.LatLngBounds();
      allPts.forEach(p=>bounds.extend(p));
      map.setBounds(bounds,50);
      
      setStatus('✓ 카카오 실제 도로 경로 표시됨');
    } else {
      setStatus('❌ 경로 탐색 실패 - 직선 표시');
      drawRouteOnMap(route);
    }
  })
  .catch(e => { setStatus('❌ API 오류: '+e.message); });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 팝업 - 경유지 수동 검색
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openPopup(rId, wpIdx) {
  popupTarget = {rId, wpIdx};
  const route = ROUTES.find(r=>r.id===rId);
  const wpName = route?.waypoints_forward?.[wpIdx] || '';
  
  document.getElementById('ptitle').textContent = `📍 "${wpName}" 위치 검색`;
  document.getElementById('psearch').value = wpName;
  document.getElementById('presults').innerHTML = '';
  document.getElementById('popup').classList.add('show');
  
  // 벡터 방향성 후보 표시
  showVectorCandidates(rId, wpIdx, wpName);
}

function showVectorCandidates(rId, wpIdx, wpName) {
  const route = ROUTES.find(r=>r.id===rId);
  if (!route) return;
  
  const wd = workData[rId] || {};
  const wps = route.waypoints_forward || [];
  
  // 이전/다음 경유지 좌표
  const prevWp = wpIdx > 0 ? (wd.waypoints||[]).find(w=>w.name===wps[wpIdx-1]) : null;
  const nextWp = wpIdx < wps.length-1 ? (wd.waypoints||[]).find(w=>w.name===wps[wpIdx+1]) : null;
  
  const findStop = (name) => { const s=STOPS.find(s=>s.name===name||(name&&s.name.includes(name))); return s?{lat:s.lat,lng:s.lng}:null; };
  const startCoord = findStop(route.start) || {lat:36.09,lng:126.69};
  const endCoord = findStop(route.end) || {lat:36.09,lng:126.69};
  
  const candidates = findCandidateStops(
    wpName,
    prevWp?.lat ? {lat:prevWp.lat,lng:prevWp.lng} : startCoord,
    nextWp?.lat ? {lat:nextWp.lat,lng:nextWp.lng} : endCoord,
    startCoord, endCoord
  );
  
  let html = `<div style="font-size:10px;color:#f5a623;margin-bottom:6px">🎯 벡터 방향성 후보 (점수순)</div>`;
  candidates.forEach(c => {
    html += `<div class="pres" onclick="selectCandidate(${c.stop.lat},${c.stop.lng},'${c.stop.id}')">
      <div class="pres-name">${c.stop.name} <span style="color:#888;font-size:10px">[${c.score}점]</span></div>
      <div class="pres-addr">${c.stop.id}</div>
      <div class="pres-coord">${c.stop.lat.toFixed(5)}, ${c.stop.lng.toFixed(5)} · ${Math.round(c.d)}m</div>
    </div>`;
  });
  
  if (!candidates.length) html += '<div style="color:#555;font-size:11px">후보 없음 - 직접 검색하세요</div>';
  document.getElementById('presults').innerHTML = html;
}

function doPopupSearch() {
  const kw = document.getElementById('psearch').value.trim();
  if (!kw) return;
  
  kakaoSearch(kw, function(data) {
    let html = `<div style="font-size:10px;color:#9ec5fe;margin-bottom:6px">📍 카카오 검색 결과</div>`;
    data.slice(0,8).forEach(d => {
      html += `<div class="pres" onclick="selectKakaoResult(${d.y},${d.x},'${d.place_name}')">
        <div class="pres-name">${d.place_name}</div>
        <div class="pres-addr">${d.address_name}</div>
        <div class="pres-coord">${parseFloat(d.y).toFixed(5)}, ${parseFloat(d.x).toFixed(5)}</div>
      </div>`;
    });
    if (!data.length) html += '<div style="color:#e94560;font-size:11px">검색 결과 없음</div>';
    document.getElementById('presults').innerHTML += html;
  });
}

function selectCandidate(lat, lng, stopId) {
  if (!popupTarget) return;
  const {rId, wpIdx} = popupTarget;
  const route = ROUTES.find(r=>r.id===rId);
  const name = route?.waypoints_forward?.[wpIdx] || '';
  
  if (!workData[rId]) workData[rId] = {waypoints:[], confirmedStops:[]};
  const existing = workData[rId].waypoints.findIndex(w=>w.name===name);
  const entry = {name, lat, lng, status:'ok', stopId, manual:true};
  if (existing>=0) workData[rId].waypoints[existing] = entry;
  else workData[rId].waypoints.push(entry);
  
  // 재스냅
  snapStopsToRoute(rId, workData[rId].waypoints, route);
  renderDetailPanel(route);
  drawRouteOnMap(route);
  closePopup();
  saveAll();
  updateProgress();
}

function selectKakaoResult(lat, lng, name) {
  if (!popupTarget) return;
  // stops에서 가장 가까운 정거장 찾기
  const nearest = STOPS.reduce((best,s) => {
    const d=dist(lat,lng,s.lat,s.lng);
    return d < best.d ? {s,d} : best;
  }, {s:null, d:9999});
  
  if (nearest.d < 200) {
    selectCandidate(nearest.s.lat, nearest.s.lng, nearest.s.id);
  } else {
    // stops에 없으면 카카오 좌표 그대로 사용
    selectCandidate(lat, lng, 'kakao_'+lat+'_'+lng);
  }
}

function enterClickMode() {
  closePopup();
  document.getElementById('click-banner').classList.add('show');
  clickCallback = function(lat, lng) {
    selectKakaoResult(lat, lng, '');
  };
}

function exitClickMode() {
  document.getElementById('click-banner').classList.remove('show');
  clickCallback = null;
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
  popupTarget = null;
}

function focusWaypoint(rId, wpIdx) {
  const wd = workData[rId];
  if (!wd || !map) return;
  const route = ROUTES.find(r=>r.id===rId);
  const name = route?.waypoints_forward?.[wpIdx];
  const wp = wd.waypoints?.find(w=>w.name===name);
  if (wp?.lat) map.panTo(new kakao.maps.LatLng(wp.lat, wp.lng));
}

function focusStop(lat, lng) {
  if (map) map.panTo(new kakao.maps.LatLng(lat, lng));
}

function removeStop(rId, stopId) {
  const wd = workData[rId];
  if (!wd) return;
  wd.confirmedStops = (wd.confirmedStops||[]).filter(id=>id!==stopId);
  wd.confirmedStopsDetail = (wd.confirmedStopsDetail||[]).filter(s=>s.id!==stopId);
  const route = ROUTES.find(r=>r.id===rId);
  if (route) renderDetailPanel(route);
  saveAll();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 전체 자동처리
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function autoAll() {
  const log = document.getElementById('auto-log');
  log.innerHTML = '';
  
  for (let i = 0; i < ROUTES.length; i++) {
    const r = ROUTES[i];
    log.innerHTML += `<div>처리중: ${r.id}번 (${i+1}/${ROUTES.length})...</div>`;
    log.scrollTop = log.scrollHeight;
    await autoMapRoute(r);
    await new Promise(res=>setTimeout(res,50));
  }
  
  saveAll();
  updateProgress();
  renderRouteList();
  log.innerHTML += '<div style="color:#4ade80;font-weight:bold">✓ 전체 완료!</div>';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 저장/불러오기/내보내기
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function saveAll() {
  try {
    localStorage.setItem('seocheon_bus_mapping', JSON.stringify(workData));
    const toast = document.getElementById('saved-toast');
    toast.style.display='block';
    setTimeout(()=>toast.style.display='none', 1500);
  } catch(e) { console.error('저장 실패:', e); }
  updateProgress();
  updateExportStats();
}

function loadSaved() {
  try {
    const saved = localStorage.getItem('seocheon_bus_mapping');
    if (saved) { workData = JSON.parse(saved); }
  } catch(e) {}
  updateProgress();
}

function updateProgress() {
  let done=0, part=0;
  ROUTES.forEach(r => {
    const wd = workData[r.id];
    if (!wd || !wd.waypoints?.length) return;
    const wps = wd.waypoints;
    const ok = wps.filter(w=>w.status==='ok').length;
    const stops = wd.confirmedStops?.length || 0;
    if (ok === wps.length && stops > 0) done++;
    else if (ok > 0 || stops > 0) part++;
  });
  const none = ROUTES.length - done - part;
  const pct = Math.round(done/ROUTES.length*100);
  
  document.getElementById('pfill').style.width = pct+'%';
  document.getElementById('p-done').textContent = `● 완료 ${done}`;
  document.getElementById('p-part').textContent = `● 진행중 ${part}`;
  document.getElementById('p-none').textContent = `● 미작업 ${none}`;
}

function updateExportStats() {
  let done=0,part=0,totalStops=0;
  ROUTES.forEach(r => {
    const wd=workData[r.id];
    if(!wd||!wd.waypoints?.length) return;
    const ok=wd.waypoints.filter(w=>w.status==='ok').length;
    const stops=wd.confirmedStops?.length||0;
    totalStops+=stops;
    if(ok===wd.waypoints.length&&stops>0) done++;
    else if(ok>0||stops>0) part++;
  });
  document.getElementById('export-stats').innerHTML = `
    전체 노선: ${ROUTES.length}개<br>
    매핑 완료: ${done}개<br>
    진행중: ${part}개<br>
    확정 정거장: ${totalStops}개<br>
    미작업: ${ROUTES.length-done-part}개
  `;
}

function exportJSON() {
  const result = ROUTES.map(r => ({
    ...r,
    mapping: workData[r.id] || null
  }));
  const blob = new Blob([JSON.stringify(result, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'seocheon_bus_routes_mapped.json';
  a.click();
}

function exportCSV() {
  let csv = '노선ID,노선명,유형,기점,종점,평일횟수,첫차,막차,정거장수,정거장목록\n';
  ROUTES.forEach(r => {
    const wd = workData[r.id];
    const stops = wd?.confirmedStopsDetail?.map(s=>s.name).join('|') || '';
    const stopCount = wd?.confirmedStops?.length || 0;
    csv += `"${r.id}","${r.group}","${r.type}","${r.start}","${r.end}","${r.weekday}","${r.first_bus}","${r.last_bus}","${stopCount}","${stops}"\n`;
  });
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'seocheon_bus_routes.csv';
  a.click();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 유틸
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const names=['list','detail','export'];
    t.classList.toggle('active', names[i]===name);
  });
  document.getElementById('tab-list').style.display = name==='list'?'flex':'none';
  document.getElementById('tab-detail').style.display = name==='detail'?'flex':'none';
  document.getElementById('tab-export').style.display = name==='export'?'flex':'none';
  // flex/none toggle for panels
  ['tab-list','tab-detail','tab-export'].forEach(id => {
    document.getElementById(id).className = 'panel' + (document.getElementById(id).style.display!=='none'?' active':'');
  });
}

function setStatus(msg) {
  const el = document.getElementById('map-status');
  if (msg) { el.textContent=msg; el.classList.add('show'); }
  else el.classList.remove('show');
}
