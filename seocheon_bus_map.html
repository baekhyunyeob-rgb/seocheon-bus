<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서천군 시내버스 노선도</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --border: #2a3347;
    --accent: #4f9cf9;
    --accent2: #f97316;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --panel-w: 280px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 헤더 ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 100;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header h1 span { color: var(--accent); }
  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    background: rgba(79,156,249,0.15);
    color: var(--accent);
    border: 1px solid rgba(79,156,249,0.3);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .stop-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }
  .stop-count b { color: var(--accent2); }

  /* ── 레이아웃 ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 사이드 패널 ── */
  .panel {
    width: var(--panel-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .panel-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section h2 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* 오버레이 투명도 */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .slider-row label { font-size: 12px; color: var(--text-muted); flex: 1; }
  .slider-row span {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    width: 32px;
    text-align: right;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* 토글 버튼 */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .toggle-row label { font-size: 12px; }
  .toggle {
    position: relative;
    width: 36px; height: 20px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: .2s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: .2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

  /* 검색 */
  .search-box {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    gap: 6px;
    margin-bottom: 10px;
  }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    flex: 1;
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-icon { color: var(--text-muted); font-size: 13px; }

  /* 정류장 목록 */
  .stop-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .stop-list::-webkit-scrollbar { width: 4px; }
  .stop-list::-webkit-scrollbar-track { background: transparent; }
  .stop-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .stop-item {
    padding: 7px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stop-item:hover {
    background: rgba(79,156,249,0.07);
    border-left-color: var(--accent);
  }
  .stop-item.active {
    background: rgba(79,156,249,0.12);
    border-left-color: var(--accent);
  }
  .stop-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .stop-name { font-size: 12px; line-height: 1.4; }
  .stop-id {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* ── 지도 영역 ── */
  #map {
    flex: 1;
    position: relative;
  }

  /* 정보 팝업 */
  .info-popup {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    z-index: 50;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    white-space: nowrap;
    pointer-events: none;
  }
  .info-popup b { color: var(--accent); }

  /* 줌 컨트롤 */
  .map-controls {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }
  .map-btn {
    width: 34px; height: 34px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .map-btn:hover { background: var(--accent); border-color: var(--accent); }

  /* 범례 */
  .legend {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    z-index: 50;
  }
  .legend-title { color: var(--text-muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
  .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* 로딩 */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 14px;
  }
  .loading-overlay p { font-size: 13px; color: var(--text-muted); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>서천군 <span>시내버스</span> 노선도</h1>
  <span class="badge">BETA</span>
  <span class="badge" style="background:rgba(249,115,22,0.15);color:#f97316;border-color:rgba(249,115,22,0.3);">1단계 · 이미지 오버레이</span>
  <div class="stop-count">정류장 <b id="displayCount">0</b>개 표시 중</div>
</header>

<div class="layout">
  <!-- 사이드 패널 -->
  <div class="panel">
    <div class="panel-section">
      <h2>노선도 오버레이</h2>
      <div class="slider-row">
        <label>투명도</label>
        <span id="opacityVal">60%</span>
      </div>
      <input type="range" id="opacitySlider" min="0" max="100" value="60">

      <div style="margin-top: 14px;">
        <div class="toggle-row">
          <label>노선도 이미지 표시</label>
          <label class="toggle">
            <input type="checkbox" id="toggleOverlay" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label>정류장 마커 표시</label>
          <label class="toggle">
            <input type="checkbox" id="toggleMarkers" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label>고속도로 정류장 포함</label>
          <label class="toggle">
            <input type="checkbox" id="toggleGgb">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <h2>정류장 검색</h2>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="정류장 이름 검색…">
      </div>
    </div>

    <div class="stop-list" id="stopList"></div>
  </div>

  <!-- 지도 -->
  <div id="map">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p>카카오맵 불러오는 중…</p>
    </div>

    <div class="info-popup" id="infoPopup"></div>

    <div class="map-controls">
      <button class="map-btn" onclick="map.setLevel(map.getLevel()-1)">+</button>
      <button class="map-btn" onclick="map.setLevel(map.getLevel()+1)">−</button>
      <button class="map-btn" onclick="resetView()" title="전체 보기">⊙</button>
    </div>

    <div class="legend">
      <div class="legend-title">범례</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4f9cf9"></div> 시내버스 정류장</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> 고속도로 (미정차)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> 선택된 정류장</div>
    </div>
  </div>
</div>

// ── 이미지 오버레이 생성 ───────────────────────────────────
function createImageOverlay() {
  // 노선도 이미지의 실제 지리 범위 (대략적 추정값 - 조정 필요)
  // 이미지를 보면: 북쪽=미산면사무소(약 36.21), 남쪽=군산터미널(약 35.97)
  //               서쪽=서면 끝(약 126.50), 동쪽=입포하나로마트(약 126.88)
  const swLat = 35.965, swLng = 126.490;
  const neLat = 36.225, neLng = 126.895;

  const sw = new kakao.maps.LatLng(swLat, swLng);
  const ne = new kakao.maps.LatLng(neLat, neLng);
  const bounds = new kakao.maps.LatLngBounds(sw, ne);

  // 이미지 오버레이를 CustomOverlay로 구현 (지도 이동에 따라 갱신)
  overlay = { bounds, visible: true, opacity: 0.6 };

  // 실제 구현: 지도 위에 절대 위치로 img 엘리먼트를 그리는 커스텀 오버레이
  const overlayDiv = document.createElement('div');
  overlayDiv.id = 'routeOverlay';
  overlayDiv.style.cssText = `
    position: absolute;
    pointer-events: none;
    opacity: 0.6;
    mix-blend-mode: multiply;
  `;
  const img = document.createElement('img');
  // seocheonbus.com의 이미지를 직접 참조 (CORS 허용 시)
  // 업로드된 이미지를 base64로 쓰거나 URL 직접 사용
  img.src = 'https://www.seocheonbus.com/board_file/1744083059_%EB%85%B8%EC%84%A0%EB%8F%84_%EC%9A%94%EB%8F%84.png';
  img.style.cssText = 'width:100%;height:100%;object-fit:fill;';
  img.onerror = () => {
    img.src = ''; // 실패 시 빈 이미지
  };
  overlayDiv.appendChild(img);

  // 지도 컨테이너에 추가하고 위치 동적으로 갱신
  const mapContainer = document.getElementById('map');
  mapContainer.appendChild(overlayDiv);
  overlay.el = overlayDiv;
  overlay.img = img;

  // 지도 이동/줌 시 오버레이 위치 갱신
  kakao.maps.event.addListener(map, 'bounds_changed', updateOverlayPosition);
  kakao.maps.event.addListener(map, 'zoom_changed', updateOverlayPosition);
  updateOverlayPosition();
}

function updateOverlayPosition() {
  if (!overlay || !overlay.el) return;

  const proj = map.getProjection();
  const { bounds } = overlay;

  const swPoint = proj.pointFromCoords(bounds.getSouthWest());
  const nePoint = proj.pointFromCoords(bounds.getNorthEast());

  const left = swPoint.x;
  const top = nePoint.y;
  const width = nePoint.x - swPoint.x;
  const height = swPoint.y - nePoint.y;

  overlay.el.style.left = left + 'px';
  overlay.el.style.top = top + 'px';
  overlay.el.style.width = width + 'px';
  overlay.el.style.height = height + 'px';
}

// ── 마커 렌더링 ────────────────────────────────────────────
function renderMarkers() {
  // 기존 마커 제거
  markers.forEach(m => m.setMap(null));
  markers = [];

  const showMarkers = document.getElementById('toggleMarkers').checked;
  if (!showMarkers) { updateCount(); return; }

  const data = showGgb ? STOPS_DATA : STOPS_DATA.filter(s => s.id.startsWith('CNB'));

  // SVG 마커 이미지
  const makeSvg = (color) => {
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10'><circle cx='5' cy='5' r='4' fill='${color}' stroke='white' stroke-width='1.5'/></svg>`;
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  };

  const cnbImg = new kakao.maps.MarkerImage(makeSvg('#4f9cf9'), new kakao.maps.Size(10, 10));
  const ggbImg = new kakao.maps.MarkerImage(makeSvg('#f97316'), new kakao.maps.Size(10, 10));

  data.forEach(stop => {
    const isGgb = stop.id.startsWith('GGB');
    const marker = new kakao.maps.Marker({
      map,
      position: new kakao.maps.LatLng(stop.lat, stop.lng),
      image: isGgb ? ggbImg : cnbImg,
      title: stop.name
    });

    kakao.maps.event.addListener(marker, 'click', () => selectStop(stop, marker));
    markers.push(marker);
  });

  updateCount();
}

function selectStop(stop, marker) {
  // 팝업 표시
  const popup = document.getElementById('infoPopup');
  popup.innerHTML = `<b>${stop.name}</b> &nbsp;·&nbsp; <span style="color:var(--text-muted);font-size:11px">${stop.id}</span><br><span style="font-size:11px;color:var(--text-muted)">${stop.lat.toFixed(5)}, ${stop.lng.toFixed(5)}</span>`;
  popup.style.display = 'block';
  setTimeout(() => popup.style.display = 'none', 3000);

  // 지도 이동
  map.panTo(new kakao.maps.LatLng(stop.lat, stop.lng));

  // 목록 하이라이트
  document.querySelectorAll('.stop-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`[data-id="${stop.id}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }
}

// ── 목록 렌더링 ────────────────────────────────────────────
function renderList(data) {
  const list = document.getElementById('stopList');
  const filt = showGgb ? data : data.filter(s => s.id.startsWith('CNB'));

  // 중복 제거 (id 기준)
  const seen = new Set();
  const unique = filt.filter(s => { if (seen.has(s.id)) return false; seen.add(s.id); return true; });

  list.innerHTML = unique.map(s => `
    <div class="stop-item" data-id="${s.id}" onclick="jumpTo(${s.lat}, ${s.lng}, '${s.id}', '${s.name.replace(/'/g,"\\'")}')">
      <div class="stop-dot" style="background:${s.id.startsWith('GGB') ? '#f97316' : '#4f9cf9'}"></div>
      <div>
        <div class="stop-name">${s.name}</div>
        <div class="stop-id">${s.id}</div>
      </div>
    </div>
  `).join('');
}

function jumpTo(lat, lng, id, name) {
  map.panTo(new kakao.maps.LatLng(lat, lng));
  map.setLevel(5);
  const popup = document.getElementById('infoPopup');
  popup.innerHTML = `<b>${name}</b> &nbsp;·&nbsp; <span style="color:var(--text-muted);font-size:11px">${id}</span>`;
  popup.style.display = 'block';
  setTimeout(() => popup.style.display = 'none', 3000);
  document.querySelectorAll('.stop-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.add('active');
}

function updateCount() {
  const data = showGgb ? STOPS_DATA : STOPS_DATA.filter(s => s.id.startsWith('CNB'));
  document.getElementById('displayCount').textContent = data.length;
}

function resetView() {
  map.setCenter(new kakao.maps.LatLng(36.0980, 126.7130));
  map.setLevel(9);
}

// ── 컨트롤 이벤트 ─────────────────────────────────────────
document.getElementById('opacitySlider').addEventListener('input', function() {
  const v = this.value;
  document.getElementById('opacityVal').textContent = v + '%';
  if (overlay && overlay.el) overlay.el.style.opacity = v / 100;
});

document.getElementById('toggleOverlay').addEventListener('change', function() {
  if (overlay && overlay.el) overlay.el.style.display = this.checked ? 'block' : 'none';
});

document.getElementById('toggleMarkers').addEventListener('change', () => renderMarkers());

document.getElementById('toggleGgb').addEventListener('change', function() {
  showGgb = this.checked;
  renderMarkers();
  renderList(STOPS_DATA);
});

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const filtered = STOPS_DATA.filter(s => s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q));
  renderList(filtered);
});
</script>
</body>
</html>
