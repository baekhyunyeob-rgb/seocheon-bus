  // 중앙부
  { id: 's28', name: '서천읍내',          lat: 36.0760, lng: 126.6970, routes: ['R1','R2','R3'], type: 'stop' },
  { id: 's29', name: '군사공원단지',      lat: 36.0320, lng: 126.7530, routes: ['R3'], type: 'stop' },
  { id: 's30', name: '신산리',           lat: 36.1180, lng: 126.7600, routes: ['R1'], type: 'stop' },
  { id: 's31', name: '한산면소재지',      lat: 36.1250, lng: 126.7790, routes: ['R1','R5'], type: 'stop' },
  { id: 's32', name: '지현리',           lat: 36.0860, lng: 126.8100, routes: ['R3'], type: 'stop' },
  { id: 's33', name: '태양리',           lat: 36.1680, lng: 126.8420, routes: ['R1','R5'], type: 'stop' },
  { id: 's34', name: '문산리',           lat: 36.1350, lng: 126.8490, routes: ['R1','R5','R6'], type: 'stop' },
  { id: 's35', name: '마산시내',         lat: 36.0950, lng: 126.8300, routes: ['R1'], type: 'stop' },
  { id: 's36', name: '판교시내',         lat: 36.0540, lng: 126.9030, routes: ['R3'], type: 'stop' },
  { id: 's37', name: '군산공항단지',     lat: 35.9960, lng: 126.7510, routes: ['R3','R4'], type: 'stop' },
  { id: 's38', name: '비인시내',         lat: 36.0590, lng: 126.6190, routes: ['R1','R2'], type: 'stop' },
  { id: 's39', name: '서천중학교',       lat: 36.0740, lng: 126.6880, routes: ['R2','R3'], type: 'stop' },
  { id: 's40', name: '장항역',          lat: 36.0060, lng: 126.6960, routes: ['R2','R4'], type: 'major' },

// =============================================
// 앱 상태
// =============================================
let map, markers = {}, polylines = [], clusterer;
let activeRoutes = new Set(Object.keys(ROUTES));
let selectedStop = null;
let mapTypeId = 'ROADMAP';
let searchQuery = '';

// =============================================
// 지도 초기화
// =============================================
function initMap() {
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(36.0900, 126.7500),
    level: 9
  });

  // 마커 생성
  STOPS.forEach(stop => {
    const marker = createStopMarker(stop);
    markers[stop.id] = marker;
  });

  // 노선 폴리라인
  drawRoutes();

  // 사이드바 렌더링
  renderRoutChips();
  renderStopList();
  updateStats();
}

function createStopMarker(stop) {
  const isTerminal = stop.type === 'terminal';
  const isMajor = stop.type === 'major';

  // 마커 색상: 첫 번째 노선 색상 사용
  const color = ROUTES[stop.routes[0]]?.color || '#6b7280';

  const size = isTerminal ? 14 : isMajor ? 10 : 7;

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${size*2+4}" height="${size*2+4}">
      <circle cx="${size+2}" cy="${size+2}" r="${size}" fill="${color}" stroke="white" stroke-width="${isTerminal ? 2.5 : 1.5}" opacity="0.9"/>
      ${isTerminal ? `<circle cx="${size+2}" cy="${size+2}" r="${size*0.45}" fill="white"/>` : ''}
    </svg>
  `.trim();

  const markerImage = new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(size*2+4, size*2+4),
    { offset: new kakao.maps.Point(size+2, size+2) }
  );

  const marker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(stop.lat, stop.lng),
    map: map,
    image: markerImage,
    title: stop.name,
    zIndex: isTerminal ? 5 : isMajor ? 3 : 1
  });

  kakao.maps.event.addListener(marker, 'click', () => selectStop(stop));

  return marker;
}

function drawRoutes() {
  // 기존 폴리라인 제거
  polylines.forEach(p => p.setMap(null));
  polylines = [];

  Object.entries(ROUTES).forEach(([routeId, route]) => {
    if (!activeRoutes.has(routeId)) return;

    const stopObjs = route.stops.map(name => STOPS.find(s => s.name === name)).filter(Boolean);
    if (stopObjs.length < 2) return;

    const path = stopObjs.map(s => new kakao.maps.LatLng(s.lat, s.lng));
    const polyline = new kakao.maps.Polyline({
      path,
      strokeWeight: 3,
      strokeColor: route.color,
      strokeOpacity: 0.75,
      strokeStyle: 'solid',
      map: map
    });
    polylines.push(polyline);
  });
}

// =============================================
// UI 렌더링
// =============================================
function renderRoutChips() {
  const container = document.getElementById('route-chips');
  container.innerHTML = '';
  Object.entries(ROUTES).forEach(([id, route]) => {
    const chip = document.createElement('div');
    chip.className = 'route-chip' + (activeRoutes.has(id) ? ' active' : '');
    chip.style.background = route.color + '33';
    chip.style.borderColor = activeRoutes.has(id) ? route.color : 'transparent';
    chip.style.color = route.color;
    chip.textContent = id.replace('R', '') + '번';
    chip.onclick = () => toggleRoute(id);
    container.appendChild(chip);
  });
}

function renderStopList() {
  const container = document.getElementById('stop-list');
  container.innerHTML = '';

  const filtered = STOPS.filter(stop => {
    const matchSearch = !searchQuery || stop.name.includes(searchQuery);
    const matchRoute = stop.routes.some(r => activeRoutes.has(r));
    return matchSearch && matchRoute;
  });

  filtered.forEach(stop => {
    const item = document.createElement('div');
    item.className = 'stop-item' + (selectedStop?.id === stop.id ? ' active' : '');
    item.id = 'list-' + stop.id;

    const color = ROUTES[stop.routes[0]]?.color || '#6b7280';
    item.style.borderLeftColor = selectedStop?.id === stop.id ? color : 'transparent';

    const dot = document.createElement('div');
    dot.className = 'stop-dot';
    dot.style.background = color;

    const name = document.createElement('div');
    name.className = 'stop-name';
    name.textContent = stop.name;

    const tags = document.createElement('div');
    tags.className = 'stop-routes';
    stop.routes.slice(0, 3).forEach(r => {
      const tag = document.createElement('div');
      tag.className = 'route-tag';
      tag.style.background = ROUTES[r]?.color || '#6b7280';
      tag.title = ROUTES[r]?.name || r;
      tags.appendChild(tag);
    });

    item.appendChild(dot);
    item.appendChild(name);
    item.appendChild(tags);
    item.onclick = () => { selectStop(stop); panToStop(stop); };
    container.appendChild(item);
  });

  document.getElementById('stat-visible').textContent = filtered.length;
}

function updateStats() {
  document.getElementById('stat-stops').textContent = STOPS.length;
  document.getElementById('stat-routes').textContent = Object.keys(ROUTES).length;
  document.getElementById('stat-visible').textContent = STOPS.filter(s => s.routes.some(r => activeRoutes.has(r))).length;
}

// =============================================
// 인터랙션
// =============================================
function toggleRoute(routeId) {
  if (activeRoutes.has(routeId)) {
    if (activeRoutes.size === 1) return; // 최소 1개 유지
    activeRoutes.delete(routeId);
  } else {
    activeRoutes.add(routeId);
  }

  // 마커 가시성 업데이트
  STOPS.forEach(stop => {
    const visible = stop.routes.some(r => activeRoutes.has(r));
    markers[stop.id]?.setVisible(visible);
  });

  drawRoutes();
  renderRoutChips();
  renderStopList();
  updateStats();
}

function selectStop(stop) {
  selectedStop = stop;

  // 패널 표시
  document.getElementById('info-name').textContent = stop.name;
  document.getElementById('info-addr').textContent = `위도 ${stop.lat.toFixed(4)} / 경도 ${stop.lng.toFixed(4)}`;

  const routeList = document.getElementById('info-routes');
  routeList.innerHTML = '';
  stop.routes.forEach(r => {
    const route = ROUTES[r];
    if (!route) return;
    const badge = document.createElement('div');
    badge.className = 'info-route-badge';
    badge.style.background = route.color + '33';
    badge.style.color = route.color;
    badge.style.border = `1px solid ${route.color}55`;
    badge.textContent = route.name;
    routeList.appendChild(badge);
  });

  document.getElementById('info-panel').classList.add('visible');

  // 사이드바 항목 하이라이트
  renderStopList();
  const el = document.getElementById('list-' + stop.id);
  el?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function panToStop(stop) {
  map.setCenter(new kakao.maps.LatLng(stop.lat, stop.lng));
  map.setLevel(7);
}

function closeInfo() {
  document.getElementById('info-panel').classList.remove('visible');
  selectedStop = null;
  renderStopList();
}

function filterStops() {
  searchQuery = document.getElementById('search-input').value.trim();
  renderStopList();
}

function fitAll() {
  const bounds = new kakao.maps.LatLngBounds();
  STOPS.forEach(s => bounds.extend(new kakao.maps.LatLng(s.lat, s.lng)));
  map.setBounds(bounds);
}

function toggleMapType() {
  const btn = event.currentTarget;
  if (mapTypeId === 'ROADMAP') {
    map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
    mapTypeId = 'HYBRID';
    btn.classList.add('active');
    btn.textContent = '일반지도';
  } else {
    map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    mapTypeId = 'ROADMAP';
    btn.classList.remove('active');
    btn.textContent = '위성지도';
  }
}

// 지도 클릭 시 패널 닫기
kakao.maps.event.addListener ? '' : '';
window.addEventListener('load', () => {
  initMap();
  setTimeout(() => {
    if (map) {
      kakao.maps.event.addListener(map, 'click', () => closeInfo());
    }
  }, 500);
});
</script>
</body>
</html>
