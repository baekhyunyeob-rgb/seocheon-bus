<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정류장 위경도 검증 도구</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f0f2f5; }

.header {
  background: #1D9E75;
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.header h1 { font-size: 16px; font-weight: 700; }
.progress { font-size: 13px; opacity: .85; }
.progress-bar { height: 3px; background: rgba(255,255,255,.3); margin-top: 4px; border-radius: 2px; }
.progress-fill { height: 100%; background: #fff; border-radius: 2px; transition: width .3s; }

.layout { display: flex; height: calc(100vh - 60px); }

/* 좌측: 지도 */
.map-panel { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* 우측: 정보 패널 */
.info-panel {
  width: 360px;
  flex-shrink: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #e0e0e0;
  overflow: hidden;
}

.stop-info {
  padding: 16px;
  border-bottom: 1px solid #f0f0f0;
}
.stop-index { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.stop-name { font-size: 18px; font-weight: 800; color: #111; margin-bottom: 6px; }
.stop-coords { font-size: 12px; color: #666; background: #f8f8f8; padding: 6px 10px; border-radius: 8px; font-family: monospace; }
.stop-status {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 6px;
  font-weight: 600;
}
.status-ok { background: #e6f7ef; color: #1D9E75; }
.status-modified { background: #fff3e0; color: #EF9F27; }
.status-pending { background: #f5f5f5; color: #888; }

/* 검색 */
.search-area {
  padding: 12px 16px;
  border-bottom: 1px solid #f0f0f0;
  background: #fafafa;
}
.search-area label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
.search-row { display: flex; gap: 6px; }
.search-input {
  flex: 1;
  padding: 7px 10px;
  border: 1.5px solid #e0e0e0;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.search-input:focus { border-color: #1D9E75; }
.btn-search {
  padding: 7px 12px;
  background: #1D9E75;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}

/* 후보 목록 */
.candidates { flex: 1; overflow-y: auto; padding: 8px; }
.cand-item {
  padding: 10px 12px;
  border: 1.5px solid #e8e8e8;
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all .15s;
}
.cand-item:hover { border-color: #1D9E75; background: #f0faf5; }
.cand-item.selected { border-color: #1D9E75; background: #e6f7ef; }
.cand-name { font-size: 13px; font-weight: 700; color: #111; }
.cand-addr { font-size: 11px; color: #888; margin-top: 2px; }
.cand-dist { font-size: 11px; color: #1D9E75; font-weight: 600; margin-top: 2px; }
.cand-current { font-size: 10px; background: #185FA5; color: #fff; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }

/* 액션 버튼 */
.actions {
  padding: 12px 16px;
  border-top: 1px solid #f0f0f0;
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
}
.btn:active { opacity: .8; }
.btn-confirm { background: #1D9E75; color: #fff; }
.btn-skip    { background: #f0f0f0; color: #555; }
.btn-prev    { background: #f0f0f0; color: #555; flex: 0 0 auto; padding: 10px 14px; }
.btn-download { background: #185FA5; color: #fff; }

/* 하단 통계 */
.stats {
  padding: 10px 16px;
  background: #f8f8f8;
  border-top: 1px solid #f0f0f0;
  display: flex;
  gap: 12px;
  font-size: 11px;
}
.stat { text-align: center; }
.stat-num { font-size: 16px; font-weight: 800; display: block; }
.stat-ok  { color: #1D9E75; }
.stat-mod { color: #EF9F27; }
.stat-skip{ color: #888; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🚏 정류장 위경도 검증 도구</h1>
    <div class="progress">
      <span id="progress-text">로딩 중...</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
  <button class="btn btn-download" onclick="downloadResult()" style="flex:none;padding:8px 14px;font-size:12px">
    💾 저장
  </button>
</div>

<div class="layout">
  <div class="map-panel">
    <div id="map"></div>
  </div>

  <div class="info-panel">
    <div class="stop-info">
      <div class="stop-index" id="stop-index">-</div>
      <div class="stop-name" id="stop-name">-</div>
      <div class="stop-coords" id="stop-coords">-</div>
      <span class="stop-status status-pending" id="stop-status">대기중</span>
    </div>

    <div class="search-area">
      <label>카카오맵 검색 (자동)</label>
      <div class="search-row">
        <input type="text" class="search-input" id="search-input" placeholder="정류장명 입력">
        <button class="btn-search" onclick="searchKakao()">검색</button>
      </div>
    </div>

    <div class="candidates" id="candidates">
      <div style="text-align:center;padding:30px;color:#bbb;font-size:13px">검색 결과가 여기에 표시돼요</div>
    </div>

    <div class="stats">
      <div class="stat"><span class="stat-num stat-ok" id="cnt-ok">0</span>확인</div>
      <div class="stat"><span class="stat-num stat-mod" id="cnt-mod">0</span>수정</div>
      <div class="stat"><span class="stat-num stat-skip" id="cnt-skip">0</span>건너뜀</div>
      <div class="stat"><span class="stat-num" style="color:#aaa" id="cnt-remain">-</span>남음</div>
    </div>

    <div class="actions">
      <button class="btn btn-prev" onclick="prevStop()">◀</button>
      <button class="btn btn-skip" onclick="skipStop()">건너뜀</button>
      <button class="btn btn-confirm" onclick="confirmStop()">✓ 확인</button>
    </div>
  </div>
</div>

<script>
const KAKAO_KEY = 'ea4bdbbdf5c627aba4db0a4b163c9b0d';

let stops = [];
let results = {}; // { id: { ...stop, verified: true/false, modified: false } }
let currentIdx = 0;
let map = null;
let currentMarker = null;
let candidateMarkers = [];
let selectedCandidate = null;

// stops.json 로드
async function loadStops() {
  const res = await fetch('data/stops.json');
  stops = await res.json();

  // 저장된 진행상황 복원
  const saved = localStorage.getItem('verify_stops_progress');
  if (saved) {
    results = JSON.parse(saved);
    const confirmed = Object.values(results).filter(r => r.status !== 'pending').length;
    if (confirmed > 0 && confirm(`이전 진행상황이 있어요 (${confirmed}개 완료). 이어서 할까요?`)) {
      // 마지막으로 처리 안 된 인덱스 찾기
      currentIdx = stops.findIndex(s => !results[s.id] || results[s.id].status === 'pending');
      if (currentIdx === -1) currentIdx = stops.length - 1;
    } else {
      results = {};
    }
  }

  // 초기 results 설정
  stops.forEach(s => {
    if (!results[s.id]) {
      results[s.id] = { ...s, status: 'pending' };
    }
  });

  updateStats();
  showStop(currentIdx);
}

// 카카오맵 초기화
function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(36.0758, 126.6908),
    level: 5
  });
}

// 현재 정류장 표시
function showStop(idx) {
  if (idx < 0 || idx >= stops.length) return;
  currentIdx = idx;
  const stop = stops[idx];
  const result = results[stop.id];

  // UI 업데이트
  document.getElementById('stop-index').textContent = `${idx + 1} / ${stops.length}`;
  document.getElementById('stop-name').textContent = stop.name;
  document.getElementById('stop-coords').textContent =
    `현재: ${result.lat.toFixed(6)}, ${result.lng.toFixed(6)}`;

  const statusEl = document.getElementById('stop-status');
  if (result.status === 'ok') {
    statusEl.textContent = '✓ 확인됨';
    statusEl.className = 'stop-status status-ok';
  } else if (result.status === 'modified') {
    statusEl.textContent = '✏ 수정됨';
    statusEl.className = 'stop-status status-modified';
  } else if (result.status === 'skipped') {
    statusEl.textContent = '→ 건너뜀';
    statusEl.className = 'stop-status status-pending';
  } else {
    statusEl.textContent = '대기중';
    statusEl.className = 'stop-status status-pending';
  }

  // 지도 이동 + 마커
  const latlng = new kakao.maps.LatLng(result.lat, result.lng);
  map.setCenter(latlng);
  map.setLevel(4);

  if (currentMarker) currentMarker.setMap(null);
  currentMarker = new kakao.maps.Marker({ position: latlng, map });

  // 인포윈도우
  const iw = new kakao.maps.InfoWindow({
    content: `<div style="padding:4px 8px;font-size:12px;font-weight:700">${stop.name}</div>`
  });
  iw.open(map, currentMarker);

  // 후보 마커 초기화
  clearCandidateMarkers();
  selectedCandidate = null;

  // 검색창 설정 후 자동 검색
  document.getElementById('search-input').value = stop.name;
  searchKakao();

  updateProgress();
}

// 카카오 로컬 검색
async function searchKakao() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  const stop = stops[currentIdx];
  const url = `https://dapi.kakao.com/v2/local/search/keyword.json?` +
    `query=${encodeURIComponent(query + ' 버스정류장')}&` +
    `x=${stop.lng}&y=${stop.lat}&radius=3000&size=10`;

  try {
    const res = await fetch(url, {
      headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
    });
    const data = await res.json();
    renderCandidates(data.documents || []);
  } catch(e) {
    // 버스정류장 없으면 일반 검색
    const url2 = `https://dapi.kakao.com/v2/local/search/keyword.json?` +
      `query=${encodeURIComponent(query)}&` +
      `x=${stop.lng}&y=${stop.lat}&radius=5000&size=10`;
    const res2 = await fetch(url2, { headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }});
    const data2 = await res2.json();
    renderCandidates(data2.documents || []);
  }
}

// 후보 목록 렌더링
function renderCandidates(docs) {
  clearCandidateMarkers();
  const stop = stops[currentIdx];
  const result = results[stop.id];
  const container = document.getElementById('candidates');

  if (docs.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;font-size:13px">검색 결과 없음</div>';
    return;
  }

  container.innerHTML = docs.map((d, i) => {
    const dist = getDistM(parseFloat(d.y), parseFloat(d.x), result.lat, result.lng);
    const isCurrent = dist < 30;
    return `<div class="cand-item ${isCurrent ? 'selected' : ''}" onclick="selectCandidate(${i})" data-idx="${i}"
      data-lat="${d.y}" data-lng="${d.x}" data-name="${d.place_name}">
      <div class="cand-name">${d.place_name}${isCurrent ? '<span class="cand-current">현재</span>' : ''}</div>
      <div class="cand-addr">${d.address_name}</div>
      <div class="cand-dist">현재 위치에서 ${dist < 1000 ? dist.toFixed(0)+'m' : (dist/1000).toFixed(1)+'km'}</div>
    </div>`;
  }).join('');

  // 후보 마커 지도에 표시
  docs.forEach((d, i) => {
    const latlng = new kakao.maps.LatLng(parseFloat(d.y), parseFloat(d.x));
    const marker = new kakao.maps.Marker({
      position: latlng,
      map,
      image: new kakao.maps.MarkerImage(
        'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
        new kakao.maps.Size(24, 35)
      )
    });
    kakao.maps.event.addListener(marker, 'click', () => selectCandidate(i));
    candidateMarkers.push(marker);
  });
}

// 후보 선택
function selectCandidate(idx) {
  selectedCandidate = idx;
  document.querySelectorAll('.cand-item').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });

  const el = document.querySelector(`.cand-item[data-idx="${idx}"]`);
  if (el) {
    const lat = parseFloat(el.dataset.lat);
    const lng = parseFloat(el.dataset.lng);
    map.setCenter(new kakao.maps.LatLng(lat, lng));
  }
}

// 확인 (현재 또는 선택한 좌표로 저장)
function confirmStop() {
  const stop = stops[currentIdx];
  const result = results[stop.id];

  if (selectedCandidate !== null) {
    const el = document.querySelector(`.cand-item[data-idx="${selectedCandidate}"]`);
    if (el) {
      const newLat = parseFloat(el.dataset.lat);
      const newLng = parseFloat(el.dataset.lng);
      const dist = getDistM(newLat, newLng, stop.lat, stop.lng);

      results[stop.id] = {
        ...result,
        lat: newLat,
        lng: newLng,
        status: dist < 30 ? 'ok' : 'modified',
        kakaoName: el.dataset.name
      };
    }
  } else {
    results[stop.id] = { ...result, status: 'ok' };
  }

  saveProgress();
  updateStats();
  nextStop();
}

// 건너뜀
function skipStop() {
  results[stops[currentIdx].id].status = 'skipped';
  saveProgress();
  updateStats();
  nextStop();
}

function nextStop() {
  if (currentIdx < stops.length - 1) showStop(currentIdx + 1);
}

function prevStop() {
  if (currentIdx > 0) showStop(currentIdx - 1);
}

// 진행 저장
function saveProgress() {
  localStorage.setItem('verify_stops_progress', JSON.stringify(results));
}

// 통계 업데이트
function updateStats() {
  const vals = Object.values(results);
  document.getElementById('cnt-ok').textContent    = vals.filter(r => r.status === 'ok').length;
  document.getElementById('cnt-mod').textContent   = vals.filter(r => r.status === 'modified').length;
  document.getElementById('cnt-skip').textContent  = vals.filter(r => r.status === 'skipped').length;
  document.getElementById('cnt-remain').textContent = vals.filter(r => r.status === 'pending').length;
}

function updateProgress() {
  const done = Object.values(results).filter(r => r.status !== 'pending').length;
  const pct  = Math.round(done / stops.length * 100);
  document.getElementById('progress-text').textContent = `${currentIdx+1} / ${stops.length} (${pct}% 완료)`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// 결과 다운로드
function downloadResult() {
  const output = stops.map(s => {
    const r = results[s.id] || s;
    return {
      id:   s.id,
      name: s.name,
      lat:  r.lat,
      lng:  r.lng,
      status:    r.status || 'pending',
      kakaoName: r.kakaoName || null
    };
  });

  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stops_verified.json';
  a.click();
}

// 후보 마커 초기화
function clearCandidateMarkers() {
  candidateMarkers.forEach(m => m.setMap(null));
  candidateMarkers = [];
}

// 거리 계산 (미터)
function getDistM(lat1, lng1, lat2, lng2) {
  const R = 111000;
  return Math.sqrt(Math.pow((lat1-lat2)*R, 2) + Math.pow((lng1-lng2)*R*Math.cos(lat1*Math.PI/180), 2));
}

// 카카오맵 SDK 로드
window.KAKAO_KEY = KAKAO_KEY;
const script = document.createElement('script');
script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_KEY}&autoload=false&libraries=services`;
script.onload = () => {
  kakao.maps.load(() => {
    initMap();
    loadStops();
  });
};
document.head.appendChild(script);
</script>
</body>
</html>
