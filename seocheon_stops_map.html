  'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
  new kakao.maps.Size(24, 35)
);

let allMarkers = [];
let infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

function createMarkers(stops) {
  return stops.map(stop => {
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(stop.lat, stop.lng),
      title: stop.name
    });

    kakao.maps.event.addListener(marker, 'click', function() {
      infowindow.setContent(`
        <div class="info-window">
          <div class="stop-name">🚏 ${stop.name}</div>
          <div class="stop-id">ID: ${stop.id}</div>
          <div class="stop-coord">📍 ${stop.lat.toFixed(5)}, ${stop.lng.toFixed(5)}</div>
        </div>
      `);
      infowindow.open(map, marker);
    });

    return marker;
  });
}

// 초기 마커 생성
allMarkers = createMarkers(STOPS);
clusterer.addMarkers(allMarkers);

// 지도 클릭 시 인포윈도우 닫기
kakao.maps.event.addListener(map, 'click', function() {
  infowindow.close();
});

// 검색
function searchStops() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) { resetMap(); return; }

  const filtered = STOPS.filter(s => s.name.includes(query));
  document.getElementById('result-count').textContent =
    filtered.length > 0 ? `"${query}" 검색결과: ${filtered.length}개` : '검색 결과 없음';

  clusterer.clear();
  allMarkers = createMarkers(filtered);
  clusterer.addMarkers(allMarkers);

  if (filtered.length > 0) {
    const bounds = new kakao.maps.LatLngBounds();
    filtered.forEach(s => bounds.extend(new kakao.maps.LatLng(s.lat, s.lng)));
    map.setBounds(bounds);
  }
}

function resetMap() {
  document.getElementById('search-input').value = '';
  document.getElementById('result-count').textContent = '';
  clusterer.clear();
  allMarkers = createMarkers(STOPS);
  clusterer.addMarkers(allMarkers);
  map.setCenter(new kakao.maps.LatLng(36.0965, 126.7126));
  map.setLevel(10);
  infowindow.close();
}

// 엔터키 검색
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchStops();
});
